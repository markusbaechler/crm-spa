<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bbz CRM</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --line: #dbe3ee;
      --line-2: #e9eef5;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-soft: #eff4ff;
      --green: #15803d;
      --amber: #b45309;
      --red: #b91c1c;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; font-style: normal !important; }

    html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: "Segoe UI", Inter, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    body { padding: 10px; }
    #app-shell { max-width: 1800px; margin: 0 auto; }

    /* ===================== HEADER — eine Zeile ===================== */
    .bbz-header {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
    }
    .bbz-brand { font-size: 20px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; white-space: nowrap; flex-shrink: 0; }
    /* Subtitle ausgeblendet — zu viel Text in einer Zeile */
    .bbz-subtitle { display: none; }

    /* Nav zentriert in der Mitte */
    .bbz-nav {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px;
      height: 40px;
    }
    .bbz-nav-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .bbz-nav-btn:hover { background: var(--line-2); color: var(--text); }
    /* GEÄNDERT: Aktiver State blau gefüllt statt Border */
    .bbz-nav-btn.active { background: var(--blue); color: #fff; }

    /* Toolbar rechts */
    .bbz-toolbar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .bbz-auth {
      display: inline-flex; align-items: center; gap: 7px;
      height: 36px; padding: 0 11px;
      border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel-2); color: var(--muted); font-size: 12px; white-space: nowrap;
    }
    .bbz-auth-dot { width: 7px; height: 7px; border-radius: 999px; background: #22c55e; flex: 0 0 auto; }

    .bbz-main { margin-top: 10px; }

    /* ===================== IO DROPDOWN ===================== */
    .bbz-io-wrap { position: relative; }
    .bbz-io-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 4px;
      min-width: 160px;
      z-index: 50;
    }
    .bbz-io-wrap.open .bbz-io-menu { display: block; }
    .bbz-io-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 10px;
      background: none; border: none; border-radius: 8px;
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: left; white-space: nowrap;
    }
    .bbz-io-item:hover { background: var(--panel-2); }
    .bbz-io-icon { font-size: 14px; }

    /* ===================== BANNER ===================== */
    .bbz-banner { display: none; margin-bottom: 10px; border-radius: 14px; border: 1px solid var(--line); padding: 10px 14px; font-size: 14px; line-height: 1.4; background: var(--panel); }
    .bbz-banner.show { display: block; }
    .bbz-banner-success { background: #eefaf2; border-color: #c9ead5; color: var(--green); }
    .bbz-banner-warning { background: #fff9eb; border-color: #f4dfab; color: var(--amber); }
    .bbz-banner-error { background: #fff1f1; border-color: #f1caca; color: var(--red); }
    .bbz-banner-info { background: #f8fafc; border-color: var(--line); color: var(--text); }

    .bbz-section { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
    .bbz-section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--line-2); background: #fbfcfe; }
    .bbz-section-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .bbz-section-subtitle { margin-top: 2px; font-size: 12px; color: var(--muted); }
    .bbz-section-body { padding: 12px 14px 14px; }

    /* ===================== KPI-CARDS — kompakter ===================== */
    .bbz-kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
    .bbz-kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow); }
    /* GEÄNDERT: min-height entfernt, Label ohne uppercase */
    .bbz-kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); }
    .bbz-kpi-value { margin-top: 5px; font-size: 26px; line-height: 1; font-weight: 800; letter-spacing: -0.04em; }
    .bbz-kpi-meta { margin-top: 5px; font-size: 12px; color: var(--muted); }
    .bbz-kpi-meta-alert { margin-top: 5px; font-size: 12px; color: var(--red); font-weight: 700; }
    .bbz-kpi-meta-warn  { margin-top: 5px; font-size: 12px; color: var(--amber); font-weight: 600; }
    .bbz-kpi-meta-ok    { margin-top: 5px; font-size: 12px; color: var(--green); font-weight: 600; }

    /* Interaktive KPI-Chips */
    .bbz-kpi-chip {
      display: inline-flex; align-items: center; gap: 4px;
      height: 22px; padding: 0 8px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--panel-2);
      color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.1s;
    }
    .bbz-kpi-chip:hover { background: #e8f0fe; border-color: #c3d7fd; color: var(--blue); }
    .bbz-kpi-chip span { font-weight: 700; color: var(--text); }
    .bbz-kpi-chip-active { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
    .bbz-kpi-chip-active span { color: #1d4ed8; }
    .bbz-kpi-chip-active-gold { background: #fef9c3; border-color: #fbbf24; color: #78350f; }
    .bbz-kpi-chip-active-gold span { color: #78350f; }

    /* Klickbare KPI-Kachel */
    .bbz-kpi-clickable { transition: background 0.1s; }
    .bbz-kpi-clickable:hover { background: #f0f7ff; border-color: #bfdbfe; }

    /* Detail-Band: border-bottom durchgezogen, kein weisser Spalt zu KPIs */
    .bbz-detail-band { border-radius: 16px; padding: 20px 20px 16px; margin-bottom: 10px; }

    .bbz-grid { display: grid; gap: 12px; }
    .bbz-grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .bbz-grid-3 { grid-template-columns: 1.05fr 1.25fr 1.25fr; }
    .bbz-grid-70-30 { grid-template-columns: minmax(0, 1.75fr) minmax(340px, 0.85fr); gap: 12px; }

    .bbz-button, .bbz-input, .bbz-select { height: 36px; border-radius: 9px; border: 1px solid var(--line); background: #fff; color: var(--text); font-size: 13px; padding: 0 12px; }
    .bbz-button { appearance: none; }
    .bbz-input { appearance: none; }
    .bbz-select { appearance: auto; padding-right: 26px; cursor: pointer; width: 100%; }
    .bbz-input::placeholder { color: #94a3b8; }
    .bbz-input:focus, .bbz-select:focus { outline: none; border-color: #8fb4ff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10); }
    .bbz-button { display: inline-flex; align-items: center; justify-content: center; gap: 7px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .bbz-button:disabled { opacity: 0.55; cursor: not-allowed; }
    .bbz-button-primary { background: var(--blue); color: white; border-color: var(--blue); }
    .bbz-button-secondary { background: white; color: var(--text); }

    .bbz-filters-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .bbz-filters-4 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .bbz-checkbox { display: inline-flex; align-items: center; gap: 9px; min-height: 36px; padding: 0 12px; border: 1px solid var(--line); border-radius: 9px; background: #fff; font-size: 13px; }
    .bbz-checkbox input { width: 14px; height: 14px; accent-color: var(--blue); }

    /* ===================== TABELLE — Table-Header ohne Uppercase ===================== */
    .bbz-table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
    .bbz-table { width: 100%; min-width: 940px; border-collapse: separate; border-spacing: 0; }
    /* GEÄNDERT: kein uppercase, kein letter-spacing, font-weight 600 statt 700 */
    .bbz-table th {
      position: sticky; top: 0; z-index: 2;
      background: #f8fafc; color: var(--muted);
      font-size: 12px; font-weight: 600;
      text-align: left; padding: 9px 12px;
      border-bottom: 1px solid var(--line); white-space: nowrap;
    }
    /* DENSE MODE — wird via JS-Toggle auf body gesetzt */
    .bbz-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid var(--line-2); vertical-align: middle; background: #fff; }
    body.bbz-dense .bbz-table td { padding: 5px 12px; }
    .bbz-table tbody tr:hover td { background: #f8fbff; }
    .bbz-table tbody tr:last-child td { border-bottom: none; }

    /* ===================== DENSE MODE TOGGLE ===================== */
    .bbz-dense-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      height: 28px; padding: 0 9px;
      border: 1px solid var(--line); border-radius: 7px;
      background: #fff; color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    .bbz-dense-toggle:hover { background: var(--panel-2); }
    body.bbz-dense .bbz-dense-toggle { background: var(--blue-soft); color: var(--blue); border-color: #c3d7fd; }

    .bbz-link { color: var(--text); text-decoration: none; font-weight: 600; cursor: pointer; }
    .bbz-link:hover { color: var(--blue); }
    .bbz-subtext { margin-top: 2px; font-size: 12px; color: var(--muted); }
    .bbz-muted { color: var(--muted); }
    .bbz-danger { color: var(--red); font-weight: 700; }
    .bbz-warning { color: var(--amber); font-weight: 700; }
    .bbz-success { color: var(--green); font-weight: 700; }
    td.bbz-danger  { color: var(--red);   font-weight: 700; }
    td.bbz-warning { color: var(--amber); font-weight: 700; }
    td.bbz-success { color: var(--green); font-weight: 700; }

    .bbz-pill { display: inline-flex; align-items: center; min-height: 22px; padding: 0 8px; border-radius: 999px; border: 1px solid var(--line); background: #fff; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .bbz-pill-a { background: #eaf2ff; color: #1d4ed8; border-color: #cfe0ff; }
    .bbz-pill-b { background: #fff5e7; color: var(--amber); border-color: #f3dec0; }
    .bbz-pill-c { background: #f3f6fa; color: #475569; border-color: #d8e0ea; }
    .bbz-pill-vip { background: #ecfdf3; color: #047857; border-color: #c8eed8; }
    .bbz-chip { display: inline-flex; align-items: center; min-height: 20px; padding: 0 7px; border-radius: 999px; background: #f8fafc; border: 1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 600; margin: 2px 5px 2px 0; }

    /* ===================== STATUS CHIPS ===================== */
    .bbz-status-chip {
      display: inline-flex; align-items: center; min-height: 22px;
      padding: 0 8px; border-radius: 999px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      border: 1px solid transparent;
    }
    .bbz-status-open    { background: #fff9eb; color: var(--amber); border-color: #f4dfab; }
    .bbz-status-done    { background: #eefaf2; color: var(--green); border-color: #c9ead5; }
    .bbz-status-overdue { background: #fff1f1; color: var(--red);   border-color: #f1caca; }

    /* ===================== AVATAR INITIALEN ===================== */
    .bbz-avatar {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      vertical-align: middle; margin-right: 8px;
    }
    /* 6 Farben — werden per JS via data-avatar-idx gesetzt */
    .bbz-avatar[data-idx="0"] { background: #eff4ff; color: #2563eb; }
    .bbz-avatar[data-idx="1"] { background: #f0fdf4; color: #15803d; }
    .bbz-avatar[data-idx="2"] { background: #fff7ed; color: #c2410c; }
    .bbz-avatar[data-idx="3"] { background: #fdf4ff; color: #7e22ce; }
    .bbz-avatar[data-idx="4"] { background: #fff1f2; color: #be123c; }
    .bbz-avatar[data-idx="5"] { background: #f0fdfa; color: #0f766e; }

    /* Avatar-Zelle — kein Umbruch */
    .bbz-td-name { display: flex; align-items: center; }

    .bbz-cockpit-stack { display: grid; gap: 10px; }
    .bbz-mini-list { display: grid; gap: 7px; }
    .bbz-mini-item { border: 1px solid var(--line); border-radius: 11px; padding: 9px 11px; background: var(--panel); }
    .bbz-mini-title { font-size: 13px; font-weight: 700; line-height: 1.25; color: var(--text); }
    .bbz-mini-meta { margin-top: 3px; font-size: 12px; color: var(--muted); line-height: 1.35; }

    .bbz-detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .bbz-detail-title { font-size: 28px; font-weight: 800; line-height: 1.02; letter-spacing: -0.04em; }
    .bbz-detail-subtitle { margin-top: 5px; font-size: 14px; color: var(--muted); line-height: 1.4; }

    /* ===================== KV-ROWS ===================== */
    .bbz-meta-grid { display: block; }
    .bbz-kv { display: flex; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--line-2); min-height: unset; background: none; border-radius: 0; border-left: none; border-right: none; border-top: none; }
    .bbz-kv:last-child { border-bottom: none; }
    .bbz-kv-label { flex: 0 0 130px; font-size: 11px; color: var(--muted); font-weight: 600; padding-right: 10px; line-height: 1.4; text-transform: none; letter-spacing: 0; margin-bottom: 0; }
    .bbz-kv-value { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-word; }

    /* ===================== SEGMENT-BADGES ===================== */
    .bbz-pill-a { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; border-left: 3px solid #2563eb; }
    .bbz-pill-b { background: #fef3c7; color: #92400e; border-color: #fcd34d; border-left: 3px solid #d97706; }
    .bbz-pill-c { background: #f1f5f9; color: #334155; border-color: #cbd5e1; border-left: 3px solid #64748b; }
    .bbz-pill-vip { background: #fef9c3; color: #78350f; border-color: #fbbf24; }
    .bbz-pill-vip::before { content: "♛ "; font-size: 11px; }
    .bbz-pill-lead { background: #f0fdf4; color: #15803d; border-color: #86efac; font-weight: 700; }

    /* ===================== FARBIGE DETAIL-HEADER-BAND ===================== */
    .bbz-detail-band { border-radius: 16px 16px 0 0; padding: 20px 20px 16px; margin-bottom: 0; }
    .bbz-detail-band-a { background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border: 1px solid #bfdbfe; border-bottom: none; }
    .bbz-detail-band-b { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 1px solid #fde68a; border-bottom: none; }
    .bbz-detail-band-c { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border: 1px solid #e2e8f0; border-bottom: none; }
    .bbz-detail-band-vip { background: linear-gradient(135deg, #fefce8 0%, #fef9c3 100%); border: 1px solid #fde68a; border-bottom: none; }
    .bbz-detail-band-default { background: var(--panel-2); border: 1px solid var(--line); border-bottom: none; border-radius: 16px 16px 0 0; padding: 20px 20px 16px; }

    /* ===================== GROSSER AVATAR (Kontakt-Detail) ===================== */
    .bbz-avatar-lg { width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
    .bbz-avatar-lg[data-idx="0"] { background: #dbeafe; color: #1d4ed8; }
    .bbz-avatar-lg[data-idx="1"] { background: #dcfce7; color: #15803d; }
    .bbz-avatar-lg[data-idx="2"] { background: #ffedd5; color: #c2410c; }
    .bbz-avatar-lg[data-idx="3"] { background: #f3e8ff; color: #7e22ce; }
    .bbz-avatar-lg[data-idx="4"] { background: #ffe4e6; color: #be123c; }
    .bbz-avatar-lg[data-idx="5"] { background: #ccfbf1; color: #0f766e; }

    .bbz-timeline { display: grid; gap: 7px; }
    .bbz-timeline-item { display: grid; grid-template-columns: 140px 1fr; gap: 12px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 11px; background: var(--panel); }
    .bbz-timeline-date { font-size: 12px; color: var(--muted); line-height: 1.35; }
    .bbz-timeline-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .bbz-timeline-text { font-size: 13px; color: #334155; line-height: 1.45; white-space: pre-wrap; }

    .bbz-empty { border: 1px dashed #cfd8e3; border-radius: 11px; padding: 20px 16px; text-align: center; color: var(--muted); background: #fbfdff; font-size: 13px; }
    .bbz-loader { width: 16px; height: 16px; border: 2px solid rgba(37, 99, 235, 0.14); border-top-color: var(--blue); border-radius: 999px; animation: bbzspin 0.75s linear infinite; flex: 0 0 auto; }
    @keyframes bbzspin { to { transform: rotate(360deg); } }

    /* ===================== MODAL ===================== */
    .bbz-modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(15, 23, 42, 0.55); backdrop-filter: blur(3px);
      align-items: center; justify-content: center; padding: 16px;
    }
    .bbz-modal-backdrop.show { display: flex; }
    .bbz-modal {
      background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      width: 100%; max-width: 780px; max-height: 90vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .bbz-modal-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--line-2); background: #fbfcfe; flex-shrink: 0; }
    .bbz-modal-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .bbz-modal-body { padding: 20px; overflow-y: auto; flex: 1 1 auto; }
    .bbz-modal-footer { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--line-2); background: #fbfcfe; flex-shrink: 0; }
    .bbz-form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .bbz-field { display: flex; flex-direction: column; gap: 5px; }
    .bbz-field label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.03em; text-transform: uppercase; }
    .bbz-textarea { appearance: none; border-radius: 9px; border: 1px solid var(--line); background: #fff; color: var(--text); font-size: 13px; padding: 9px 12px; resize: vertical; min-height: 80px; font-family: inherit; }
    .bbz-textarea:focus { outline: none; border-color: #8fb4ff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10); }
    .bbz-span-2 { grid-column: span 2; }
    .bbz-field-hint { font-size: 10px; color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 4px; }

    .bbz-multi-choice { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 2px; }
    .bbz-multi-choice-item { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px; background: #fff; font-size: 13px; cursor: pointer; user-select: none; }
    .bbz-multi-choice-item:has(input:checked) { background: var(--blue-soft); border-color: #93b4f5; color: var(--blue); }
    .bbz-multi-choice-item input { width: 13px; height: 13px; accent-color: var(--blue); }
    .bbz-readonly-chips { padding: 8px 0 2px; min-height: 36px; }

    /* ===================== FOKUS-BAR ===================== */
    .bbz-focus-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 10px 14px; margin-bottom: 10px;
      box-shadow: var(--shadow);
    }
    .bbz-focus-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      white-space: nowrap; flex-shrink: 0; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .bbz-focus-items { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .bbz-focus-item {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 8px; border: 1px solid var(--line);
      background: var(--panel-2); cursor: pointer; text-decoration: none;
      font-size: 13px; transition: background 0.1s;
    }
    .bbz-focus-item:hover { background: #f0f6ff; border-color: #c3d7fd; }
    .bbz-focus-overdue { border-color: #f1caca !important; background: #fff8f8 !important; }
    .bbz-focus-overdue:hover { background: #fff1f1 !important; }
    .bbz-focus-soon { border-color: #f4dfab !important; background: #fffdf5 !important; }
    .bbz-focus-firm { font-weight: 700; color: var(--text); font-size: 12px; }
    .bbz-focus-task { color: var(--muted); font-size: 12px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bbz-focus-date { font-size: 11px; font-weight: 700; color: var(--red); white-space: nowrap; }
    .bbz-focus-soon .bbz-focus-date { color: var(--amber); }
    .bbz-focus-more {
      font-size: 12px; font-weight: 700; color: var(--blue);
      white-space: nowrap; cursor: pointer; text-decoration: none; flex-shrink: 0;
    }
    .bbz-focus-more:hover { text-decoration: underline; }
    /* Alles-OK Zustand */
    .bbz-focus-clear {
      background: #f0fdf6 !important;
      border-color: #c8eed8 !important;
    }
    .bbz-focus-icon { font-size: 15px; }
    .bbz-focus-clear-text { font-size: 13px; color: var(--green); font-weight: 600; }

    /* ===================== AKTIVITÄTS-SIGNALE ===================== */
    .bbz-signal {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }
    .bbz-signal-red   { background: var(--red); box-shadow: 0 0 0 2px #ffd5d5; }
    .bbz-signal-amber { background: var(--amber); box-shadow: 0 0 0 2px #ffefc6; }
    .bbz-signal-none  { background: transparent; }

    /* Zeilenfärbung — sehr subtil, nicht aufdringlich */
    tr.bbz-row-alert td { background: #fffbfb !important; }
    tr.bbz-row-alert:hover td { background: #fff4f4 !important; }
    tr.bbz-row-cold td { background: #fffdf5 !important; }
    tr.bbz-row-cold:hover td { background: #fff9e6 !important; }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 1280px) {
      .bbz-kpis, .bbz-grid-3, .bbz-grid-70-30 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 920px) {
      body { padding: 6px; }
      .bbz-header { height: auto; flex-wrap: wrap; padding: 10px 12px; gap: 10px; }
      .bbz-nav { justify-content: flex-start; flex-wrap: wrap; height: auto; }
      .bbz-kpis, .bbz-grid-2, .bbz-grid-3, .bbz-grid-70-30,
      .bbz-filters-3, .bbz-filters-4, .bbz-meta-grid,
      .bbz-form-grid { grid-template-columns: 1fr; }
      .bbz-timeline-item { grid-template-columns: 1fr; }
      .bbz-detail-title { font-size: 24px; }
      .bbz-span-2 { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <header class="bbz-header">
      <!-- Brand links -->
      <div class="bbz-brand">bbz CRM</div>

      <!-- Nav zentriert -->
      <nav class="bbz-nav">
        <button class="bbz-nav-btn active" data-route="firms">Firmen</button>
        <button class="bbz-nav-btn" data-route="contacts">Kontakte</button>
        <button class="bbz-nav-btn" data-route="planning">Planung</button>
        <button class="bbz-nav-btn" data-route="history">Aktivitäten</button>
        <button class="bbz-nav-btn" data-route="events">Events</button>
      </nav>

      <!-- Actions rechts -->
      <div class="bbz-toolbar">
        <button id="btn-login" class="bbz-button bbz-button-primary" style="height:36px;">Anmelden</button>
        <button id="btn-refresh" class="bbz-button bbz-button-secondary" style="height:36px;">↺ Laden</button>

        <!-- IO Dropdown -->
        <div class="bbz-io-wrap" id="io-wrap">
          <button class="bbz-button bbz-button-secondary" style="height:36px;" id="btn-io-toggle">↑↓ IO ▾</button>
          <div class="bbz-io-menu">
            <button class="bbz-io-item" onclick="window.bbzIO.openExportModal('contacts');document.getElementById('io-wrap').classList.remove('open')">
              <span class="bbz-io-icon">📤</span> Kontakte exportieren
            </button>
            <button class="bbz-io-item" onclick="window.bbzIO.openExportModal('event');document.getElementById('io-wrap').classList.remove('open')">
              <span class="bbz-io-icon">🎟</span> Event exportieren
            </button>
            <button class="bbz-io-item" onclick="window.bbzIO.openImportModal();document.getElementById('io-wrap').classList.remove('open')">
              <span class="bbz-io-icon">📥</span> Importieren
            </button>
          </div>
        </div>

        <div id="auth-status" class="bbz-auth">
          <span class="bbz-auth-dot"></span>
          <span>Initialisierung …</span>
        </div>
      </div>
    </header>

    <main class="bbz-main">
      <div id="global-message" class="bbz-banner"></div>
      <div id="view-root"></div>
    </main>
  </div>

  <script>
    // IO Dropdown Toggle
    const ioWrap = document.getElementById('io-wrap');
    document.getElementById('btn-io-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      ioWrap.classList.toggle('open');
    });
    document.addEventListener('click', () => ioWrap.classList.remove('open'));

    // Dense Mode Toggle — wird von app.js via window.bbzToggleDense nutzbar
    window.bbzToggleDense = function() {
      document.body.classList.toggle('bbz-dense');
    };
  </script>

  <script src="./app.js"></script>
  <script src="./io.js"></script>
</body>
</html>
