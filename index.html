<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        .prio-A, .prio-1 { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        .prio-B, .prio-2 { background: #f3f4f6; color: #374151; border: 1px solid #9ca3af; }
        .prio-C, .prio-3 { background: #ffedd5; color: #9a3412; border: 1px solid #f97316; }
        .timeline-line { border-left: 2px solid #e2e8f0; margin-left: 0.75rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-slate-900 text-white shadow-xl p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-400 tracking-tighter cursor-pointer hover:text-blue-300 transition" onclick="showListView()">bbz CRM</h1>
            <div id="auth-area">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-bold transition shadow-lg">Login</button>
                <div id="user-info" class="hidden flex items-center gap-4">
                    <span id="username" class="text-sm font-medium text-slate-400"></span>
                    <button id="logout-btn" class="text-xs text-slate-400 hover:text-white underline font-sans">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 font-sans">
        <div id="main-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px] flex flex-col font-sans">
            <div class="p-6 border-b border-slate-100 bg-white flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 id="view-title" class="text-2xl font-bold text-slate-800 tracking-tight font-sans">Firmenübersicht</h2>
                    <p id="view-subtitle" class="text-slate-500 text-sm mt-0.5 font-sans font-sans italic">Daten werden geladen...</p>
                </div>
                <div id="search-container" class="hidden relative font-sans">
                    <input type="text" id="company-search" placeholder="Firma suchen..." class="w-full md:w-80 pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-blue-500/20 font-bold font-sans">
                    <span class="absolute left-4 top-3 text-slate-400 font-sans">🔍</span>
                </div>
            </div>

            <div id="data-area" class="flex-1 relative font-sans">
                <div id="loading-state" class="hidden absolute inset-0 bg-white/80 z-20 flex flex-col items-center justify-center font-sans">
                    <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full mb-3 font-sans"></div>
                    <p class="text-slate-600 font-bold italic font-sans font-sans">Wird verarbeitet...</p>
                </div>
                <div id="content-display" class="p-6 font-sans"></div>
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allCompanies = [];
        let siteId = ""; 

        window.onpopstate = () => showListView(false);

        document.getElementById('company-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            const filtered = allCompanies.filter(c => (c.fields.Title || "").toLowerCase().includes(term));
            renderCompanyTable(filtered);
        });

        async function init() {
            await msalInstance.initialize();
            const response = await msalInstance.handleRedirectPromise();
            if (response) msalInstance.setActiveAccount(response.account);
            else {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) msalInstance.setActiveAccount(accounts[0]);
            }
            updateUI();
        }

        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                startDataLoad();
            }
        }

        document.getElementById('login-btn').onclick = () => msalInstance.loginRedirect({ scopes: ["Sites.ReadWrite.All"], prompt: "select_account" });
        document.getElementById('logout-btn').onclick = () => msalInstance.logoutRedirect();

        async function startDataLoad() {
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", {
                    headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` }
                });
                const siteData = await siteRes.json();
                siteId = siteData.id;

                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields(select=id,Title,PLZ,Ort,Priorit_x00e4_t)`, {
                    headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` }
                });
                const data = await response.json();
                allCompanies = data.value || [];
                renderCompanyTable(allCompanies);
            } catch (err) { console.error(err); } finally { loader.classList.add('hidden'); }
        }

        function renderCompanyTable(items) {
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('view-subtitle').innerText = `${items.length} Unternehmen`;
            document.getElementById('search-container').classList.remove('hidden');
            let html = `<div class="overflow-x-auto"><table class='w-full text-left border-separate border-spacing-y-2'><thead><tr class='text-slate-400 text-[10px] uppercase font-bold'><th class='p-4'>Firma</th><th class='p-4 text-center'>Prio</th><th class='p-4 text-right'>Ort</th></tr></thead><tbody>`;
            items.forEach(item => {
                const f = item.fields;
                let p = f.Priorit_x00e4_t || '-';
                if(p == "1") p = "A"; else if(p == "2") p = "B"; else if(p == "3") p = "C";
                html += `<tr onclick="loadContacts('${item.id}', '${(f.Title || 'Unbekannt').replace(/'/g, "\\'")}')" class='bg-white border border-slate-100 shadow-sm hover:shadow-md cursor-pointer transition-all group font-sans'>
                    <td class='p-4 rounded-l-xl border-y border-l border-slate-100 font-bold font-sans'>${f.Title || 'N/A'}</td>
                    <td class='p-4 border-y border-slate-100 text-center font-sans font-bold'><span class="prio-${p} px-3 py-1 rounded-lg text-[10px] font-black uppercase font-sans">${p}</span></td>
                    <td class='p-4 rounded-r-xl border-y border-r border-slate-100 text-slate-500 text-sm text-right font-sans italic'>${f.Ort || ''}</td></tr>`;
            });
            document.getElementById('content-display').innerHTML = html + "</tbody></table></div>";
        }

        async function loadContacts(companyId, companyName) {
            history.pushState({view: 'contacts'}, companyName, "#contacts");
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            document.getElementById('search-container').classList.add('hidden');
            
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontakte/items?expand=fields`;
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` } });
                const data = await response.json();
                
                // DIAGNOSE FÜR CREDIT EXCHANGE
                console.log("ERSTER KONTAKT ROHDATEN:", data.value[0]?.fields);

                const filtered = data.value.filter(item => {
                    const f = item.fields;
                    // Wir probieren ALLES: FirmaId, FirmaLookupId, oder das Objekt selbst
                    return f.FirmaId == companyId || f.FirmaLookupId == companyId || (f.Firma && f.Firma.LookupId == companyId);
                });
                renderContactView(filtered, companyName);
            } catch (err) { console.error(err); } finally { loader.classList.add('hidden'); }
        }

        function renderContactView(contacts, companyName) {
            window.scrollTo(0,0);
            document.getElementById('view-title').innerText = companyName;
            document.getElementById('view-subtitle').innerText = `${contacts.length} Kontakte`;
            let html = `<div class="mb-8"><button onclick="showListView()" class="text-sm font-bold text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-xl transition-all border border-blue-100 italic">← Zurück</button></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 font-sans">`;
            
            if (contacts.length === 0) {
                html += `<div class="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 italic">Keine Kontakte gefunden. Prüfe die Konsole (F12) für Feldnamen.</div>`;
            }

            contacts.forEach(c => {
                const f = c.fields;
                html += `<div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-b-4 border-b-blue-500 font-sans">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-400 italic font-sans">${(f.Vorname || '?').charAt(0)}${(f.Title || '?').charAt(0)}</div>
                        <div><h3 class="font-bold text-slate-800 italic font-sans">${f.Vorname || ''} ${f.Title || ''}</h3><p class="text-blue-600 text-[11px] font-bold uppercase italic font-sans">${f.Funktion || '-'}</p></div>
                    </div>
                    <div class="mt-4 flex gap-2 font-sans font-bold">
                        <button onclick="loadHistory('${c.id}')" class="flex-1 bg-slate-50 text-[10px] font-bold py-2 rounded-lg border border-slate-200 italic font-sans">Historie</button>
                        <button onclick="toggleNoteForm('${c.id}')" class="flex-1 bg-blue-50 text-blue-600 text-[10px] font-bold py-2 rounded-lg border border-blue-100 italic font-sans">+ Notiz</button>
                    </div>
                    <div id="note-form-${c.id}" class="hidden mt-4 p-3 bg-slate-50 rounded-xl border border-slate-200 font-sans italic">
                        <input type="text" id="title-${c.id}" placeholder="Betreff" class="w-full text-xs p-2 mb-2 rounded border border-slate-300">
                        <textarea id="details-${c.id}" placeholder="Details..." class="w-full text-xs p-2 mb-2 rounded border border-slate-300 h-20"></textarea>
                        <button onclick="saveNote('${c.id}')" class="w-full bg-blue-600 text-white text-xs font-bold py-2 rounded italic font-sans">Speichern</button>
                    </div>
                    <div id="history-${c.id}" class="mt-4 hidden italic font-sans"></div>
                </div>`;
            });
            document.getElementById('content-display').innerHTML = html + "</div>";
        }

        function toggleNoteForm(id) { document.getElementById(`note-form-${id}`).classList.toggle('hidden'); }

        async function saveNote(contactId) {
            const title = document.getElementById(`title-${contactId}`).value;
            const details = document.getElementById(`details-${contactId}`).value;
            if (!title) return alert("Betreff fehlt!");
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.ReadWrite.All"], account: account });
                
                // Wir nutzen exakt die Namen aus deinem Bild
                const body = { fields: { 
                    Title: title, 
                    Details_x002f_Kontext: details, 
                    KontaktpersonId: contactId, // Name aus deinem Mapping
                    Datum: new Date().toISOString() 
                } };

                const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontaktnotizen/items`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${tokenRes.accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) { alert("Gespeichert!"); toggleNoteForm(contactId); loadHistory(contactId); }
                else { const e = await res.json(); alert("Fehler: " + e.error.message); }
            } catch (err) { alert("Fehler beim Speichern."); }
        }

        async function loadHistory(contactId) {
            const historyDiv = document.getElementById(`history-${contactId}`);
            historyDiv.innerHTML = "<p class='text-[10px] animate-pulse py-2 text-blue-500 font-bold font-sans'>Lade...</p>";
            historyDiv.classList.remove('hidden');
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontaktnotizen/items?expand=fields`;
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` } });
                const data = await response.json();
                
                // Filterung: Wir schauen in 'KontaktpersonId' (oder 'Kontaktperson.LookupId')
                const notes = (data.value || []).filter(n => {
                    const f = n.fields;
                    return f.KontaktpersonId == contactId || (f.Kontaktperson && f.Kontaktperson.LookupId == contactId);
                });
                
                let html = `<div class="timeline-line mt-2 space-y-3 font-sans">`;
                notes.forEach(n => {
                    const f = n.fields;
                    html += `<div class="relative pl-6"><div class="absolute left-[-1.15rem] top-1 w-2.5 h-2.5 bg-blue-500 rounded-full border-2 border-white shadow-sm font-sans"></div>
                        <p class="text-[9px] font-bold text-slate-400 font-sans">${new Date(n.createdDateTime).toLocaleDateString('de-DE')}</p>
                        <p class="text-[11px] font-bold text-slate-800 font-sans">${f.Title || 'Notiz'}</p>
                        <p class="text-[11px] text-slate-600 italic font-sans">${f.Details_x002f_Kontext || '-'}</p></div>`;
                });
                historyDiv.innerHTML = notes.length ? html + "</div>" : "<p class='text-[10px] text-slate-400 py-2 font-sans'>Keine Einträge.</p>";
            } catch (err) { historyDiv.innerHTML = "Fehler."; }
        }

        function showListView(addToHistory = true) { 
            if (addToHistory) history.pushState({view: 'list'}, "Firmenübersicht", "#list");
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('search-container').classList.remove('hidden');
            document.getElementById('view-title').innerText = "Firmenübersicht";
            renderCompanyTable(allCompanies); 
        }
        init();
    </script>
</body>
</html>
