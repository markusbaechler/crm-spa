<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM SPA</title>
  <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/@azure/msal-browser@3.20.0/lib/msal-browser.min.js"></script>
<script>
  window.__msalLoaded = typeof window.msal !== "undefined";
</script>
  <style>
    [hidden] { display: none !important; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 9999px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #0f172a; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="app" class="min-h-screen flex flex-col">
    <header class="border-b border-slate-800 bg-slate-900/95 backdrop-blur sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <div class="text-xs uppercase tracking-[0.25em] text-sky-400">CRM SPA</div>
          <h1 class="text-2xl font-bold">Firmen, Kontakte, History & Planung</h1>
          <div class="text-xs text-slate-400 mt-1" id="authStatus">Nicht angemeldet</div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
          <input
            id="globalSearch"
            type="text"
            placeholder="Suche Firma, Kontakt, Mail, Telefon, Tags..."
            class="w-full sm:w-80 rounded-xl border border-slate-700 bg-slate-900 px-4 py-2 outline-none focus:border-sky-500"
          />
          <select id="abcFilter" class="rounded-xl border border-slate-700 bg-slate-900 px-4 py-2">
            <option value="">Alle ABC</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
          <input
            id="tagFilter"
            type="text"
            placeholder="Tag-Filter"
            class="w-full sm:w-40 rounded-xl border border-slate-700 bg-slate-900 px-4 py-2 outline-none focus:border-sky-500"
          />
          <button id="reloadBtn" class="rounded-xl bg-sky-600 hover:bg-sky-500 px-4 py-2 font-medium hidden">
            Neu laden
          </button>
          <button id="loginBtn" class="rounded-xl bg-emerald-600 hover:bg-emerald-500 px-4 py-2 font-medium">
            Login
          </button>
          <button id="logoutBtn" class="rounded-xl bg-slate-700 hover:bg-slate-600 px-4 py-2 font-medium hidden">
            Logout
          </button>
        </div>
      </div>

      <div class="max-w-7xl mx-auto px-4 pb-4 flex gap-2">
        <button data-tab="dashboard" class="tabBtn rounded-xl px-4 py-2 bg-slate-800 hover:bg-slate-700">Dashboard</button>
        <button data-tab="contacts" class="tabBtn rounded-xl px-4 py-2 bg-slate-800 hover:bg-slate-700">Kontakte</button>
        <button data-tab="planning" class="tabBtn rounded-xl px-4 py-2 bg-slate-800 hover:bg-slate-700">Planung</button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-4 py-6 flex-1">
      <div id="alertBox" hidden class="mb-4 rounded-2xl border border-amber-700 bg-amber-950/60 px-4 py-3 text-amber-200"></div>

      <!-- DASHBOARD -->
      <section id="tab-dashboard" class="tabPanel space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow">
            <div class="text-sm text-slate-400">Firmen gesamt</div>
            <div id="metricCompanies" class="text-3xl font-bold mt-2">0</div>
          </div>
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow">
            <div class="text-sm text-slate-400">Kontakte gesamt</div>
            <div id="metricContacts" class="text-3xl font-bold mt-2">0</div>
          </div>
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow">
            <div class="text-sm text-slate-400">Offene Tasks</div>
            <div id="metricTasks" class="text-3xl font-bold mt-2">0</div>
          </div>
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow">
            <div class="text-sm text-slate-400">Überfällig</div>
            <div id="metricOverdue" class="text-3xl font-bold mt-2 text-rose-400">0</div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 lg:col-span-1">
            <h2 class="text-lg font-semibold mb-4">ABC-Verteilung Firmen</h2>
            <div id="abcChart" class="space-y-4"></div>
          </div>

          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 lg:col-span-2">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold">Fällige Wiedervorlagen / Tasks</h2>
            </div>
            <div id="dueTasksList" class="space-y-3"></div>
          </div>
        </div>
      </section>

      <!-- CONTACTS / CRM MAIN -->
      <section id="tab-contacts" class="tabPanel hidden">
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
          <!-- LEFT -->
          <div class="xl:col-span-4 space-y-4">
            <div class="rounded-3xl border border-slate-800 bg-slate-900 p-4">
              <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold">Firmen</h2>
                <button id="newCompanyBtn" class="rounded-xl bg-sky-600 hover:bg-sky-500 px-3 py-2 text-sm font-medium hidden">
                  + Firma
                </button>
              </div>
              <div id="companyList" class="space-y-2 max-h-[70vh] overflow-auto scrollbar-thin"></div>
            </div>
          </div>

          <!-- RIGHT -->
          <div class="xl:col-span-8 space-y-4">
            <div id="companyDetail" class="rounded-3xl border border-slate-800 bg-slate-900 p-5 min-h-[200px]">
              <div class="text-slate-400">Bitte links eine Firma wählen.</div>
            </div>
          </div>
        </div>
      </section>

      <!-- PLANNING -->
      <section id="tab-planning" class="tabPanel hidden">
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
            <h2 class="text-lg font-semibold">Task-Planung</h2>
            <button id="newTaskBtnGlobal" class="rounded-xl bg-sky-600 hover:bg-sky-500 px-4 py-2 font-medium hidden">
              + Task
            </button>
          </div>
          <div id="planningList" class="space-y-3"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modalBackdrop" hidden class="fixed inset-0 z-50 bg-black/60 p-4">
    <div class="max-w-2xl mx-auto mt-10 rounded-3xl border border-slate-700 bg-slate-900 shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b border-slate-800">
        <h3 id="modalTitle" class="text-lg font-semibold">Dialog</h3>
        <button id="modalCloseBtn" class="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
      </div>
      <div id="modalBody" class="p-5"></div>
    </div>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const CONFIG = {
      tenantId: "3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
      clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
      sharePointSiteUrl: "https://bbzsg.sharepoint.com/sites/CRM",
      sharePointHost: "https://bbzsg.sharepoint.com",
      useSharePoint: true,

      lists: {
        companies: "Companies",
        contacts: "Kontakte",
        history: "History",
        tasks: "Tasks"
      },

      fields: {
        companies: {
          title: "Title",
          abc: "Priority",
          tags: "Tags"
        },
        contacts: {
          title: "Title",
          companyLookup: "CompanyLookup",
          email: "Email",
          phone: "Phone"
        },
        history: {
          contactId: "ContactID",
          contactLookup: "ContactLookup",
          date: "Datum",
          type: "TypEintrag",
          notes: "Notizen",
          project: "Projektbezug"
        },
        tasks: {
          title: "Title",
          contactLookup: "ContactLookup",
          dueDate: "DueDate",
          status: "Status"
        }
      }
    };

    // =========================
    // STATE
    // =========================
    const state = {
      tab: "dashboard",
      search: "",
      abcFilter: "",
      tagFilter: "",
      selectedCompanyId: null,

      companies: [],
      contacts: [],
      history: [],
      tasks: [],

      loading: false,
      activeAccount: null,
      msal: null
    };

    // =========================
    // HELPERS
    // =========================
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));

    function esc(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function uid() {
      return Math.random().toString(36).slice(2, 9);
    }

    function todayIsoDate() {
      const d = new Date();
      d.setHours(0,0,0,0);
      return d.toISOString();
    }

    function formatDateTime(v) {
      if (!v) return "-";
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return v;
      return d.toLocaleString("de-CH");
    }

    function formatDate(v) {
      if (!v) return "-";
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return v;
      return d.toLocaleDateString("de-CH");
    }

    function normalizeText(v) {
      return String(v ?? "").toLowerCase().trim();
    }

    function asArrayTags(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.filter(Boolean);
      if (value?.results && Array.isArray(value.results)) return value.results.filter(Boolean);
      return String(value)
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);
    }

    function showAlert(msg, kind = "warn") {
      const box = $("#alertBox");
      box.hidden = false;
      box.textContent = msg;
      box.className = "mb-4 rounded-2xl px-4 py-3";
      if (kind === "error") {
        box.classList.add("border", "border-rose-700", "bg-rose-950/60", "text-rose-200");
      } else if (kind === "success") {
        box.classList.add("border", "border-emerald-700", "bg-emerald-950/60", "text-emerald-200");
      } else {
        box.classList.add("border", "border-amber-700", "bg-amber-950/60", "text-amber-200");
      }
    }

    function clearAlert() {
      $("#alertBox").hidden = true;
      $("#alertBox").textContent = "";
    }

    function debugLog(...args) {
      console.log("[CRM]", ...args);
    }

    function getCompanyById(id) {
      return state.companies.find(x => Number(x.ID) === Number(id)) || null;
    }

    function getContactById(id) {
      return state.contacts.find(x => Number(x.ID) === Number(id)) || null;
    }

    function getContactsForCompany(companyId) {
      return state.contacts.filter(c => Number(c._companyId) === Number(companyId));
    }

    function getHistoryForContact(contactId) {
      return state.history
        .filter(h => Number(h._contactId) === Number(contactId))
        .sort((a, b) => new Date(b._date) - new Date(a._date));
    }

    function getTasksForContact(contactId) {
      return state.tasks
        .filter(t => Number(t._contactId) === Number(contactId))
        .sort((a, b) => new Date(a._dueDate) - new Date(b._dueDate));
    }

    function getHistoryForCompany(companyId) {
      const contactIds = new Set(getContactsForCompany(companyId).map(c => Number(c.ID)));
      return state.history
        .filter(h => contactIds.has(Number(h._contactId)))
        .sort((a, b) => new Date(b._date) - new Date(a._date));
    }

    function getTasksForCompany(companyId) {
      const contactIds = new Set(getContactsForCompany(companyId).map(c => Number(c.ID)));
      return state.tasks
        .filter(t => contactIds.has(Number(t._contactId)))
        .sort((a, b) => new Date(a._dueDate) - new Date(b._dueDate));
    }

    function isTaskOpen(task) {
      return !["Erledigt", "Done", "Closed", "Abgeschlossen"].includes(String(task._status || "").trim());
    }

    function isTaskOverdue(task) {
      if (!task._dueDate || !isTaskOpen(task)) return false;
      const due = new Date(task._dueDate);
      due.setHours(0,0,0,0);
      const now = new Date();
      now.setHours(0,0,0,0);
      return due < now;
    }

    function setAuthUi() {
      const loggedIn = !!state.activeAccount;
      $("#loginBtn").hidden = loggedIn;
      $("#logoutBtn").hidden = !loggedIn;
      $("#reloadBtn").hidden = !loggedIn;
      $("#newCompanyBtn").hidden = !loggedIn;
      $("#newTaskBtnGlobal").hidden = !loggedIn;
      $("#authStatus").textContent = loggedIn
        ? `Angemeldet als ${state.activeAccount.username || state.activeAccount.name || "-"}`
        : "Nicht angemeldet";
    }

    // =========================
    // MSAL
    // =========================
    async function initAuth() {
  if (!window.__msalLoaded || typeof window.msal === "undefined") {
    throw new Error("MSAL Script wurde nicht geladen. Bitte CDN prüfen.");
  }

  state.msal = new msal.PublicClientApplication({
    auth: {
      clientId: CONFIG.clientId,
      authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
      redirectUri: "https://markusbaechler.github.io/crm-spa/",
      postLogoutRedirectUri: "https://markusbaechler.github.io/crm-spa/",
      navigateToLoginRequestUrl: false
    },
    cache: {
      cacheLocation: "localStorage",
      storeAuthStateInCookie: false
    }
  });

  const accounts = state.msal.getAllAccounts();
  if (accounts.length) {
    state.activeAccount = accounts[0];
    state.msal.setActiveAccount(accounts[0]);
  }

  setAuthUi();
}
async function login() {
  try {
    clearAlert();

    if (!state.msal) {
      throw new Error("MSAL ist nicht initialisiert.");
    }

    const result = await state.msal.loginPopup({
      scopes: ["openid", "profile"],
      prompt: "select_account"
    });

    state.activeAccount = result.account;
    state.msal.setActiveAccount(result.account);

    setAuthUi();
    showAlert("Login erfolgreich.", "success");
    await loadAllData();
  } catch (err) {
    console.error("LOGIN ERROR", err);
    showAlert(`Login fehlgeschlagen: ${err?.message || err}`, "error");
  }
}
   

    async function logout() {
      try {
        await state.msal.logoutPopup({
          account: state.activeAccount
        });
      } catch (err) {
        console.error(err);
      } finally {
        state.activeAccount = null;
        setAuthUi();
      }
    }

    async function getAccessToken() {
  if (!state.activeAccount) {
    throw new Error("Nicht angemeldet.");
  }

  const request = {
    account: state.activeAccount,
    scopes: [`${CONFIG.sharePointHost}/AllSites.Read`]
  };

  try {
    const response = await state.msal.acquireTokenSilent(request);
    return response.accessToken;
  } catch (silentErr) {
    console.warn("Silent token failed", silentErr);

    const response = await state.msal.acquireTokenPopup(request);
    return response.accessToken;
  }
}

    // =========================
    // SHAREPOINT REST CLIENT
    // =========================
    const SP = {
      async request(path, options = {}) {
        const token = await getAccessToken();
        const url = `${CONFIG.sharePointSiteUrl}${path}`;
        const headers = {
          "Accept": "application/json;odata=nometadata",
          "Authorization": `Bearer ${token}`,
          ...(options.headers || {})
        };

        const res = await fetch(url, {
          ...options,
          headers
        });

        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`REST ${res.status}: ${text || res.statusText}`);
        }

        if (res.status === 204) return null;
        const contentType = res.headers.get("content-type") || "";
        if (contentType.includes("application/json")) return res.json();
        return res.text();
      },

      async getListEntityType(listTitle) {
        const data = await this.request(`/_api/web/lists/getbytitle('${encodeURIComponent(listTitle)}')?$select=ListItemEntityTypeFullName`);
        return data.ListItemEntityTypeFullName;
      },

      async getItems(listTitle, select, expand = "", filter = "", orderby = "", top = 5000) {
        let path = `/_api/web/lists/getbytitle('${encodeURIComponent(listTitle)}')/items?$top=${top}`;
        if (select) path += `&$select=${encodeURIComponent(select)}`;
        if (expand) path += `&$expand=${encodeURIComponent(expand)}`;
        if (filter) path += `&$filter=${encodeURIComponent(filter)}`;
        if (orderby) path += `&$orderby=${encodeURIComponent(orderby)}`;

        const data = await this.request(path);
        return data.value || [];
      },

      async createItem(listTitle, payload) {
        const entityType = await this.getListEntityType(listTitle);

        return this.request(`/_api/web/lists/getbytitle('${encodeURIComponent(listTitle)}')/items`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json;odata=verbose"
          },
          body: JSON.stringify({
            __metadata: { type: entityType },
            ...payload
          })
        });
      },

      async updateItem(listTitle, itemId, payload) {
        const entityType = await this.getListEntityType(listTitle);

        return this.request(`/_api/web/lists/getbytitle('${encodeURIComponent(listTitle)}')/items(${itemId})`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json;odata=verbose",
            "IF-MATCH": "*",
            "X-HTTP-Method": "MERGE"
          },
          body: JSON.stringify({
            __metadata: { type: entityType },
            ...payload
          })
        });
      }
    };

    // =========================
    // DATA LOAD / MAP
    // =========================
    async function loadAllData() {
      if (!state.activeAccount) return;

      clearAlert();
      state.loading = true;

      try {
        const f = CONFIG.fields;

        const companySelect = [
          "ID",
          f.companies.title,
          f.companies.abc,
          f.companies.tags
        ].join(",");

        const contactSelect = [
          "ID",
          f.contacts.title,
          f.contacts.email,
          f.contacts.phone,
          `${f.contacts.companyLookup}/Id`,
          `${f.contacts.companyLookup}/Title`
        ].join(",");

        const historySelect = [
          "ID",
          f.history.contactId,
          f.history.date,
          f.history.type,
          f.history.notes,
          f.history.project,
          `${f.history.contactLookup}/Id`,
          `${f.history.contactLookup}/Title`
        ].join(",");

        const taskSelect = [
          "ID",
          f.tasks.title,
          f.tasks.dueDate,
          f.tasks.status,
          `${f.tasks.contactLookup}/Id`,
          `${f.tasks.contactLookup}/Title`
        ].join(",");

        debugLog("Loading lists...", CONFIG.lists);

        const [companies, contacts, history, tasks] = await Promise.all([
          SP.getItems(CONFIG.lists.companies, companySelect),
          SP.getItems(CONFIG.lists.contacts, contactSelect, f.contacts.companyLookup),
          SP.getItems(CONFIG.lists.history, historySelect, f.history.contactLookup, "", `${f.history.date} desc`),
          SP.getItems(CONFIG.lists.tasks, taskSelect, f.tasks.contactLookup, "", `${f.tasks.dueDate} asc`)
        ]);

        state.companies = companies.map(item => ({
          ...item,
          _title: item[f.companies.title],
          _abc: item[f.companies.abc] || "",
          _tags: asArrayTags(item[f.companies.tags])
        }));

        state.contacts = contacts.map(item => ({
          ...item,
          _title: item[f.contacts.title],
          _email: item[f.contacts.email] || "",
          _phone: item[f.contacts.phone] || "",
          _companyId: item[f.contacts.companyLookup]?.Id || null,
          _companyTitle: item[f.contacts.companyLookup]?.Title || ""
        }));

        state.history = history.map(item => ({
          ...item,
          _date: item[f.history.date],
          _type: item[f.history.type],
          _notes: item[f.history.notes] || "",
          _project: !!item[f.history.project],
          _contactId: item[f.history.contactId] || item[f.history.contactLookup]?.Id || null,
          _contactTitle: item[f.history.contactLookup]?.Title || ""
        }));

        state.tasks = tasks.map(item => ({
          ...item,
          _title: item[f.tasks.title],
          _dueDate: item[f.tasks.dueDate],
          _status: item[f.tasks.status] || "",
          _contactId: item[f.tasks.contactLookup]?.Id || null,
          _contactTitle: item[f.tasks.contactLookup]?.Title || ""
        }));

        if (!state.selectedCompanyId && state.companies.length) {
          state.selectedCompanyId = state.companies[0].ID;
        }

        renderAll();
      } catch (err) {
        console.error(err);
        showAlert(`Daten konnten nicht geladen werden. ${err.message}`, "error");
      } finally {
        state.loading = false;
      }
    }

    // =========================
    // FILTERED DATA
    // =========================
    function getFilteredCompanies() {
      const q = normalizeText(state.search);
      const abc = normalizeText(state.abcFilter);
      const tag = normalizeText(state.tagFilter);

      return state.companies.filter(company => {
        const contacts = getContactsForCompany(company.ID);
        const haystack = [
          company._title,
          company._abc,
          (company._tags || []).join(" "),
          ...contacts.flatMap(c => [c._title, c._email, c._phone])
        ].join(" ").toLowerCase();

        const matchesSearch = !q || haystack.includes(q);
        const matchesAbc = !abc || normalizeText(company._abc) === abc;
        const matchesTag = !tag || (company._tags || []).some(t => normalizeText(t).includes(tag));

        return matchesSearch && matchesAbc && matchesTag;
      });
    }

    // =========================
    // RENDER
    // =========================
    function renderAll() {
      renderTabs();
      renderDashboard();
      renderCompanyList();
      renderCompanyDetail();
      renderPlanning();
    }

    function renderTabs() {
      $$(".tabPanel").forEach(p => p.hidden = true);
      $(`#tab-${state.tab}`).hidden = false;

      $$(".tabBtn").forEach(btn => {
        const active = btn.dataset.tab === state.tab;
        btn.className = `tabBtn rounded-xl px-4 py-2 ${active ? "bg-sky-600 text-white" : "bg-slate-800 hover:bg-slate-700"}`;
      });
    }

    function renderDashboard() {
      const companies = state.companies;
      const contacts = state.contacts;
      const openTasks = state.tasks.filter(isTaskOpen);
      const overdueTasks = state.tasks.filter(isTaskOverdue);

      $("#metricCompanies").textContent = companies.length;
      $("#metricContacts").textContent = contacts.length;
      $("#metricTasks").textContent = openTasks.length;
      $("#metricOverdue").textContent = overdueTasks.length;

      const counts = {
        A: companies.filter(c => String(c._abc).trim().toUpperCase() === "A").length,
        B: companies.filter(c => String(c._abc).trim().toUpperCase() === "B").length,
        C: companies.filter(c => String(c._abc).trim().toUpperCase() === "C").length
      };

      const total = Math.max(companies.length, 1);
      $("#abcChart").innerHTML = ["A","B","C"].map(letter => {
        const value = counts[letter];
        const pct = Math.round((value / total) * 100);
        const barClass = letter === "A" ? "bg-emerald-500" : letter === "B" ? "bg-amber-500" : "bg-slate-500";

        return `
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="font-medium">${letter}-Firmen</span>
              <span class="text-slate-400 text-sm">${value} (${pct}%)</span>
            </div>
            <div class="h-3 rounded-full bg-slate-800 overflow-hidden">
              <div class="h-full ${barClass}" style="width:${pct}%"></div>
            </div>
          </div>
        `;
      }).join("");

      const dueTasks = [...state.tasks]
        .filter(t => isTaskOpen(t))
        .sort((a, b) => new Date(a._dueDate || "9999-12-31") - new Date(b._dueDate || "9999-12-31"))
        .slice(0, 12);

      $("#dueTasksList").innerHTML = dueTasks.length ? dueTasks.map(task => {
        const contact = getContactById(task._contactId);
        const company = contact ? getCompanyById(contact._companyId) : null;
        return `

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2">

              <div class="text-sm ${isTaskOverdue(task) ? "text-rose-400" : "text-slate-300"}">
                ${formatDate(task._dueDate)} · ${esc(task._status || "-")}
              </div>
            </div>
          </div>
        `;
      }).join("") : `<div class="text-slate-400">Keine offenen Tasks.</div>`;
    }

    function renderTimeline(items, showContact = false) {
      if (!items.length) return `<div class="text-slate-500 text-sm">Keine Einträge.</div>`;

      return items.map(item => {
        const border = item._project ? "border-sky-500" : "border-slate-600";

        const contact = getContactById(item._contactId);

        return `
          <div class="border-l-4 ${border} pl-4 py-2 mb-3 bg-slate-900 rounded-r-2xl">
            <div class="text-xs text-slate-400">${formatDateTime(item._date)}</div>
            <div class="mt-1 flex items-center gap-2 flex-wrap">
              <span class="font-semibold">${esc(item._type || "-")}</span>
              <span class="text-xs ${labelColor}">${item._project ? "Projektbezogen" : "Allgemein"}</span>
              ${showContact && contact ? `<span class="text-xs text-slate-500">· ${esc(contact._title)}</span>` : ""}
            </div>
            <div class="mt-1 text-sm text-slate-200 whitespace-pre-wrap">${esc(item._notes || "-")}</div>
          </div>
        `;
      }).join("");
    }

      const payload = {
        [`${CONFIG.fields.history.contactLookup}Id`]: Number(fd.get("contactId")),
        [CONFIG.fields.history.contactId]: Number(fd.get("contactId")),
        [CONFIG.fields.history.date]: new Date().toISOString(),
        [CONFIG.fields.history.type]: fd.get("type"),
        [CONFIG.fields.history.notes]: fd.get("notes"),
        [CONFIG.fields.history.project]: fd.get("project") === "on"
      };

      try {
        await SP.createItem(CONFIG.lists.history, payload);
        closeModal();
        showAlert("History-Eintrag erstellt.", "success");
        await loadAllData();
      } catch (err) {
        console.error(err);
        showAlert(`History-Eintrag konnte nicht erstellt werden. ${err.message}`, "error");
      }
    }

    // =========================
    // EVENTS / ACTIONS
    // =========================
    function selectCompany(companyId) {
      state.selectedCompanyId = Number(companyId);
      renderCompanyList();
      renderCompanyDetail();
    }

    window.selectCompany = selectCompany;
    window.openCompanyModal = openCompanyModal;
    window.openContactModal = openContactModal;
    window.openTaskModal = openTaskModal;
    window.quickAddHistory = quickAddHistory;
    window.closeModal = closeModal;

    function bindUi() {
      $$(".tabBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.tab = btn.dataset.tab;
          renderTabs();
        });
      });

      $("#globalSearch").addEventListener("input", e => {
        state.search = e.target.value;
        renderCompanyList();
      });

      $("#abcFilter").addEventListener("change", e => {
        state.abcFilter = e.target.value;
        renderCompanyList();
      });

      $("#tagFilter").addEventListener("input", e => {
        state.tagFilter = e.target.value;
        renderCompanyList();
      });

      $("#reloadBtn").addEventListener("click", loadAllData);
      $("#loginBtn").addEventListener("click", login);
      $("#logoutBtn").addEventListener("click", logout);
      $("#newCompanyBtn").addEventListener("click", () => openCompanyModal());
      $("#newTaskBtnGlobal").addEventListener("click", () => openTaskModal());
      $("#modalCloseBtn").addEventListener("click", closeModal);

      $("#modalBackdrop").addEventListener("click", e => {
        if (e.target === $("#modalBackdrop")) closeModal();
      });
    }

    // =========================
    // START
    // =========================
    (async function start() {
      bindUi();
      try {
        await initAuth();
        if (state.activeAccount) {
          await loadAllData();
        }
      } catch (err) {
        console.error(err);
        showAlert(`Initialisierung fehlgeschlagen. ${err.message}`, "error");
      }
    })();
  </script>
</body>
</html>
