<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM bbz Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-slate-900 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <span class="text-2xl font-bold tracking-tight text-blue-400">CRM</span>
                <span class="text-xl font-light text-slate-300">bbz Light</span>
            </div>
            
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <button onclick="loadFirms()" class="hover:text-blue-400 transition">🏢 Firmen</button>
                <button onclick="renderAllContacts()" class="hover:text-blue-400 transition">👥 Kontakte</button>
            </div>

            <div id="auth-status">
                <button id="authBtn" onclick="login()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full text-sm font-semibold transition shadow-md">
                    Login
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-6">
        <div id="main-content" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 min-h-[400px]">
            <div class="text-center py-12">
                <h2 class="text-3xl font-bold text-gray-900 mb-4">Willkommen im CRM</h2>
                <p class="text-gray-500 mb-8">Bitte loggen Sie sich oben rechts ein und klicken Sie auf "Firmen", um die Daten zu laden.</p>
                <div class="flex justify-center space-x-4">
                    <div class="w-12 h-1 bg-blue-500 rounded"></div>
                    <div class="w-12 h-1 bg-slate-300 rounded"></div>
                    <div class="w-12 h-1 bg-slate-300 rounded"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <div id="modal-body-content">
                </div>
        </div>
    </div>

    <footer class="mt-20 pb-10 text-center border-t border-slate-100 pt-10">
        <p id="footer-text" class="text-slate-400 text-xs">
            © 2026 bbz CRM Light | Status: Etappe E (Kontakte-Layer)
        </p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
