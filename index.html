<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM SPA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@azure/msal-browser@3.20.0/lib/msal-browser.min.js"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold">CRM SPA</h1>
        <p class="text-slate-600">Stabile GitHub-Basis: Login + Kontakte</p>
      </div>

      <div class="flex gap-2">
        <button id="btnLogin" class="px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700">
          Login
        </button>
        <button id="btnLoad" class="px-4 py-2 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700 hidden">
          Kontakte laden
        </button>
        <button id="btnLogout" class="px-4 py-2 rounded-xl bg-slate-700 text-white hover:bg-slate-800 hidden">
          Logout
        </button>
      </div>
    </div>

    <div id="alertBox" hidden class="mb-4 rounded-2xl px-4 py-3 border"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl shadow p-5">
        <h2 class="text-xl font-semibold mb-4">Status</h2>

        <div class="space-y-3 text-sm">
          <div>
            <div class="text-slate-500">Site</div>
            <div class="font-medium break-all">https://bbzsg.sharepoint.com/sites/CRM</div>
          </div>
          <div>
            <div class="text-slate-500">Benutzer</div>
            <div id="userInfo" class="font-medium">nicht angemeldet</div>
          </div>
          <div>
            <div class="text-slate-500">Letzte Aktion</div>
            <div id="actionInfo" class="font-medium">bereit</div>
          </div>
        </div>

        <hr class="my-5" />

        <h3 class="text-lg font-semibold mb-2">Debug Log</h3>
        <div id="logBox" class="bg-slate-900 text-slate-100 rounded-xl p-3 text-xs h-80 overflow-auto font-mono"></div>
      </div>

      <div class="lg:col-span-2 bg-white rounded-2xl shadow p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Kontakte</h2>
          <input
            id="searchInput"
            type="text"
            placeholder="Suche..."
            class="border border-slate-300 rounded-xl px-3 py-2 w-72"
          />
        </div>

        <div id="contactsMeta" class="text-sm text-slate-500 mb-4">Noch keine Daten geladen.</div>

        <div class="overflow-auto border border-slate-200 rounded-2xl">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100">
              <tr>
                <th class="text-left px-4 py-3">ID</th>
                <th class="text-left px-4 py-3">Name</th>
                <th class="text-left px-4 py-3">E-Mail</th>
                <th class="text-left px-4 py-3">Telefon</th>
              </tr>
            </thead>
            <tbody id="contactsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
      tenantId: "3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
      siteUrl: "https://bbzsg.sharepoint.com/sites/CRM",
      tenantHost: "https://bbzsg.sharepoint.com",
      listName: "Kontakte",
      loginScopes: ["openid", "profile", "offline_access"],
      sharePointScopes: ["https://bbzsg.sharepoint.com/AllSites.Read"]
    };

    const $ = (id) => document.getElementById(id);

    let msalInstance = null;
    let activeAccount = null;
    let contactsCache = [];

    function log(message, data) {
      const time = new Date().toLocaleTimeString("de-CH");
      $("logBox").textContent += `[${time}] ${message}` + (data ? `\n${JSON.stringify(data, null, 2)}` : "") + "\n\n";
      $("logBox").scrollTop = $("logBox").scrollHeight;
      console.log(message, data || "");
    }

    function setAction(text) {
      $("actionInfo").textContent = text;
    }

    function showAlert(msg, kind = "warn") {
      const box = $("alertBox");
      box.hidden = false;
      box.textContent = msg;
      box.className = "mb-4 rounded-2xl px-4 py-3 border";

      if (kind === "error") {
        box.classList.add("border-rose-700", "bg-rose-50", "text-rose-800");
      } else if (kind === "success") {
        box.classList.add("border-emerald-700", "bg-emerald-50", "text-emerald-800");
      } else {
        box.classList.add("border-amber-700", "bg-amber-50", "text-amber-800");
      }
    }

    function clearAlert() {
      $("alertBox").hidden = true;
      $("alertBox").textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function refreshUi() {
      const loggedIn = !!activeAccount;
      $("btnLogin").classList.toggle("hidden", loggedIn);
      $("btnLoad").classList.toggle("hidden", !loggedIn);
      $("btnLogout").classList.toggle("hidden", !loggedIn);
      $("userInfo").textContent = loggedIn
        ? `${activeAccount.name || "-"} (${activeAccount.username})`
        : "nicht angemeldet";
    }

    async function initAuth() {
      if (typeof window.msal === "undefined") {
        throw new Error("MSAL konnte nicht geladen werden.");
      }

      msalInstance = new msal.PublicClientApplication({
        auth: {
          clientId: CONFIG.clientId,
          authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
          redirectUri: "https://markusbaechler.github.io/crm-spa/",
          postLogoutRedirectUri: "https://markusbaechler.github.io/crm-spa/",
          navigateToLoginRequestUrl: false
        },
        cache: {
          cacheLocation: "localStorage",
          storeAuthStateInCookie: false
        }
      });

      await msalInstance.initialize();

      const accounts = msalInstance.getAllAccounts();
      if (accounts.length) {
        activeAccount = accounts[0];
        msalInstance.setActiveAccount(activeAccount);
      }

      refreshUi();
    }

    async function login() {
      try {
        clearAlert();
        setAction("Login läuft");

        const result = await msalInstance.loginPopup({
          scopes: CONFIG.loginScopes,
          prompt: "select_account"
        });

        activeAccount = result.account;
        msalInstance.setActiveAccount(activeAccount);

        refreshUi();
        log("Login erfolgreich", { user: activeAccount.username });
        setAction("Login erfolgreich");
        showAlert("Login erfolgreich.", "success");
      } catch (err) {
        console.error("LOGIN ERROR", err);
        const msg = err?.message || err?.errorMessage || err?.errorCode || String(err);
        log("Login Fehler", { message: msg });
        setAction("Login fehlgeschlagen");
        showAlert(`Login fehlgeschlagen: ${msg}`, "error");
      }
    }

    async function logout() {
      try {
        await msalInstance.logoutPopup({
          account: activeAccount
        });
      } catch (err) {
        log("Logout Fehler", { message: err?.message || String(err) });
      } finally {
        activeAccount = null;
        contactsCache = [];
        renderContacts([]);
        refreshUi();
        setAction("Abgemeldet");
      }
    }

    async function getAccessToken() {
      if (!activeAccount) {
        throw new Error("Nicht angemeldet.");
      }

      const request = {
        account: activeAccount,
        scopes: CONFIG.sharePointScopes
      };

      try {
        const response = await msalInstance.acquireTokenSilent(request);
        return response.accessToken;
      } catch (silentErr) {
        log("Silent Token fehlgeschlagen", {
          message: silentErr?.message || String(silentErr)
        });

        const response = await msalInstance.acquireTokenPopup(request);
        return response.accessToken;
      }
    }

    async function loadContacts() {
      try {
        clearAlert();
        setAction("Token abrufen");

        const token = await getAccessToken();

        setAction("Kontakte laden");

        const url = `${CONFIG.siteUrl}/_api/web/lists/getbytitle('${encodeURIComponent(CONFIG.listName)}')/items?$top=200&$orderby=ID desc`;
        log("REST Request", { url });

        const response = await fetch(url, {
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/json;odata=nometadata"
          }
        });

        const text = await response.text();
        let data = null;

        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          throw new Error(`Unerwartete Antwort: ${text}`);
        }

        if (!response.ok) {
          throw new Error(`REST ${response.status}: ${JSON.stringify(data)}`);
        }

        const items = data?.value || [];
        contactsCache = items;

        renderContacts(items);
        $("contactsMeta").textContent = `${items.length} Kontakte geladen`;

        log("Kontakte geladen", {
          count: items.length,
          firstItem: items[0] || null
        });

        setAction("Kontakte erfolgreich geladen");
      } catch (err) {
        console.error(err);
        const msg = err?.message || String(err);
        log("Fehler beim Laden", { message: msg });
        setAction("Laden fehlgeschlagen");
        showAlert(`Daten konnten nicht geladen werden. ${msg}`, "error");
      }
    }

    function mapContact(item) {
      return {
        id: item.ID ?? item.Id ?? "",
        name: item.Title ?? "",
        email: item.E_x002d_Mail ?? item.EMail ?? item.Email ?? "",
        phone: item.Telefon ?? item.Phone ?? ""
      };
    }

    function renderContacts(items) {
      const body = $("contactsBody");
      body.innerHTML = "";

      if (!items.length) {
        body.innerHTML = `
          <tr>
            <td colspan="4" class="px-4 py-6 text-center text-slate-500">Keine Daten vorhanden</td>
          </tr>
        `;
        return;
      }

      items.map(mapContact).forEach(row => {
        const tr = document.createElement("tr");
        tr.className = "border-t border-slate-200 hover:bg-slate-50";
        tr.innerHTML = `
          <td class="px-4 py-3">${escapeHtml(row.id)}</td>
          <td class="px-4 py-3 font-medium">${escapeHtml(row.name)}</td>
          <td class="px-4 py-3">${escapeHtml(row.email)}</td>
          <td class="px-4 py-3">${escapeHtml(row.phone)}</td>
        `;
        body.appendChild(tr);
      });
    }

    function filterContacts(q) {
      const query = q.trim().toLowerCase();
      if (!query) {
        renderContacts(contactsCache);
        $("contactsMeta").textContent = `${contactsCache.length} Kontakte geladen`;
        return;
      }

      const filtered = contactsCache.filter(item => {
        const c = mapContact(item);
        return [c.id, c.name, c.email, c.phone]
          .join(" ")
          .toLowerCase()
          .includes(query);
      });

      renderContacts(filtered);
      $("contactsMeta").textContent = `${filtered.length} / ${contactsCache.length} Kontakte sichtbar`;
    }

    $("btnLogin").addEventListener("click", login);
    $("btnLogout").addEventListener("click", logout);
    $("btnLoad").addEventListener("click", loadContacts);
    $("searchInput").addEventListener("input", (e) => filterContacts(e.target.value));

    window.addEventListener("load", async () => {
      try {
        await initAuth();
        log("App initialisiert");
        setAction("App bereit");
      } catch (err) {
        console.error("INIT ERROR", err);
        const msg = err?.message || String(err);
        log("Init Fehler", { message: msg });
        setAction("Initialisierung fehlgeschlagen");
        showAlert(`Initialisierung fehlgeschlagen. ${msg}`, "error");
      }
    });
  </script>
</body>
</html>
