<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM - Performance Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .prio-A, .prio-1 { border-left: 4px solid #f59e0b; }
        .prio-B, .prio-2 { border-left: 4px solid #3b82f6; }
        .timeline-line { border-left: 2px solid #334155; margin-left: 10px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen italic">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-400 tracking-tighter cursor-pointer" onclick="location.reload()">bbz CRM</h1>
            <div id="auth-area" class="flex items-center gap-4">
                <span id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="username" class="text-xs text-slate-400 font-bold"></span>
                    <button id="logout-btn" class="text-xs text-slate-500 hover:text-white underline font-sans">Logout</button>
                </div>
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg text-sm font-bold transition shadow-lg">Login</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-6 px-4 grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="card-dark p-4 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-500 font-bold">A-Kunden</p><p id="stat-a" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-500 font-bold">B-Kunden</p><p id="stat-b" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-500 font-bold">C-Kunden</p><p id="stat-c" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center border-b-2 border-b-red-500"><p class="text-[10px] uppercase text-red-400 font-bold italic">Tasks</p><p id="stat-tasks" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center border-b-2 border-b-blue-500"><p class="text-[10px] uppercase text-blue-400 font-bold">Top ★</p><p id="stat-top" class="text-2xl font-black">-</p></div>
    </div>

    <main class="container mx-auto mt-6 p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 font-sans">
        <div class="lg:col-span-3 space-y-4">
            <input type="text" id="comp-search" placeholder="Suchen..." class="card-dark w-full rounded-xl px-4 py-2 text-sm outline-none text-white italic">
            <div id="company-list" class="space-y-2 max-h-[600px] overflow-y-auto pr-2 text-sm italic font-bold text-slate-400 text-center">Warte auf Login...</div>
        </div>
        <div id="detail-view" class="lg:col-span-9 space-y-6">
            <div class="card-dark p-20 rounded-2xl text-center text-slate-500 italic">Wähle eine Firma aus der Liste.</div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let db = { firmen: [], kontakte: [], notizen: [], tasks: [], history: [] };
        let firmenMap = {}; // ID -> Name Mapping

        async function init() {
            const res = await msalInstance.handleRedirectPromise();
            if (res) msalInstance.setActiveAccount(res.account);
            else if (msalInstance.getAllAccounts().length > 0) msalInstance.setActiveAccount(msalInstance.getAllAccounts()[0]);
            updateUI();
        }

        function updateUI() {
            const acc = msalInstance.getActiveAccount();
            if (acc) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username').innerText = acc.name;
                document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-green-500');
                loadAllData();
            }
        }

        document.getElementById('login-btn').onclick = () => msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };

        async function loadAllData() {
            try {
                const acc = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: acc });
                const token = tokenRes.accessToken;

                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", { headers: { 'Authorization': `Bearer ${token}` } });
                const site = await siteRes.json();
                const siteId = site.id;

                const endpoints = ["Firmen", "Kontakte", "Kontaktnotizen", "Tasks", "History"];
                const results = await Promise.all(endpoints.map(ep => 
                    fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${ep}/items?expand=fields&top=5000`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json())
                ));

                db.firmen = results[0].value || [];
                db.kontakte = results[1].value || [];
                db.notizen = results[2].value || [];
                db.tasks = results[3].value || [];
                db.history = results[4].value || [];

                // WICHTIG: Die "Übersetzungs-Matrix" bauen
                firmenMap = {};
                db.firmen.forEach(f => { firmenMap[String(f.id)] = f.fields.Title; });

                renderDashboardStats();
                renderCompanyList(db.firmen);
            } catch (err) { console.error(err); }
        }

        function renderDashboardStats() {
            const count = (p) => db.firmen.filter(f => f.fields.Priorit_x00e4_t == p).length;
            document.getElementById('stat-a').innerText = count('1') || count('A');
            document.getElementById('stat-b').innerText = count('2') || count('B');
            document.getElementById('stat-c').innerText = count('3') || count('C');
            document.getElementById('stat-tasks').innerText = db.tasks.filter(t => t.fields.Status === "Offen").length;
            document.getElementById('stat-top').innerText = db.firmen.filter(f => f.fields.TopKunde).length;
        }

        function renderCompanyList(items) {
            document.getElementById('company-list').innerHTML = items.sort((a,b) => a.fields.Title.localeCompare(b.fields.Title)).map(item => `
                <div onclick="showCompanyDetail('${item.id}')" class="card-dark p-3 rounded-xl cursor-pointer hover:bg-slate-800 transition font-bold prio-${item.fields.Priorit_x00e4_t}">
                    ${item.fields.Title}
                </div>
            `).join('');
        }

        function showCompanyDetail(cId) {
            const selectedFirmaName = firmenMap[String(cId)];

            // DER FIX: Wir suchen Kontakte, deren zugeordnete Firma (via ID) den gleichen NAMEN hat
            const contacts = db.kontakte.filter(c => {
                const kontaktFirmaId = String(c.fields.FirmaId);
                const nameInDatenbank = firmenMap[kontaktFirmaId];
                return nameInDatenbank === selectedFirmaName;
            });

            const contactIds = contacts.map(c => String(c.id));

            const timeline = [
                ...db.history.filter(h => contactIds.includes(String(h.fields.ContactLookupId))),
                ...db.notizen.filter(n => contactIds.includes(String(n.fields.KontaktpersonId)))
            ].sort((a,b) => new Date(b.fields.Datum || b.createdDateTime) - new Date(a.fields.Datum || a.createdDateTime));

            const tasks = db.tasks.filter(t => contactIds.includes(String(t.fields.ContactID)));

            renderDetailsUI(db.firmen.find(f => String(f.id) === String(cId)).fields, contacts, timeline, tasks);
        }

        function renderDetailsUI(firma, contacts, timeline, tasks) {
            document.getElementById('detail-view').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 animate-in fade-in duration-300">
                    <div class="md:col-span-12 card-dark p-6 rounded-2xl border-l-4 border-l-blue-500">
                        <h2 class="text-3xl font-black text-blue-400 italic">${firma.Title}</h2>
                        <p class="text-slate-400 text-xs font-bold mt-1">${firma.Ort || ''} | ${firma.Adresse || ''}</p>
                    </div>
                    <div class="md:col-span-5 space-y-6">
                        <section>
                            <h3 class="text-[10px] font-black uppercase text-slate-500 italic mb-3">Kontakte (${contacts.length})</h3>
                            <div class="space-y-3">
                                ${contacts.map(c => `
                                    <div class="card-dark p-4 rounded-xl border-b-4 border-b-blue-600/50">
                                        <p class="text-white font-black italic font-sans">${c.fields.Vorname || ''} ${c.fields.Title || ''}</p>
                                        <p class="text-[10px] text-slate-500 uppercase italic">${c.fields.Funktion || '-'}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                        <section>
                            <h3 class="text-[10px] font-black uppercase text-red-500 italic mb-3">Tasks</h3>
                            ${tasks.filter(t => t.fields.Status !== "Erledigt").map(t => `
                                <div class="card-dark p-3 rounded-lg text-xs border-l-2 border-l-red-500 italic mb-2">
                                    <p class="font-bold text-white">${t.fields.Title}</p>
                                </div>
                            `).join('')}
                        </section>
                    </div>
                    <div class="md:col-span-7 card-dark p-6 rounded-2xl">
                        <h3 class="text-[10px] font-black uppercase text-slate-500 italic mb-6">Timeline</h3>
                        <div class="timeline-line space-y-6">
                            ${timeline.map(h => `
                                <div class="relative pl-6">
                                    <div class="absolute left-[-15px] top-1.5 w-2.5 h-2.5 bg-blue-500 rounded-full border-2 border-slate-900 shadow-lg"></div>
                                    <p class="text-[9px] text-slate-500 font-black">${new Date(h.fields.Datum || h.createdDateTime).toLocaleDateString()}</p>
                                    <p class="text-xs font-black text-white italic mt-0.5">${h.fields.TypEintrag || h.fields.Title || 'Notiz'}</p>
                                    <p class="text-[11px] text-slate-400 italic mt-1">${h.fields.Details_x002f_Kontext || h.fields.Notizen || ''}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
        }
        init();
    </script>
</body>
</html>
