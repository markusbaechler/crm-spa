<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        .prio-A, .prio-1 { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        .prio-B, .prio-2 { background: #f3f4f6; color: #374151; border: 1px solid #9ca3af; }
        .prio-C, .prio-3 { background: #ffedd5; color: #9a3412; border: 1px solid #f97316; }
        .timeline-line { border-left: 2px solid #e2e8f0; margin-left: 0.75rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-slate-900 text-white shadow-xl p-4 sticky top-0 z-50 font-sans">
        <div class="container mx-auto flex justify-between items-center font-sans">
            <div class="flex items-center gap-6 font-sans">
                <h1 class="text-2xl font-black text-blue-400 tracking-tighter cursor-pointer font-sans" onclick="showListView()">bbz CRM</h1>
            </div>
            <div id="auth-area" class="font-sans">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-bold transition font-sans">Login mit M365</button>
                <div id="user-info" class="hidden flex items-center gap-4 font-sans">
                    <span id="username" class="text-sm font-medium text-slate-400 border-r pr-4 border-slate-700 font-sans"></span>
                    <button id="logout-btn" class="text-xs text-slate-400 hover:text-white underline font-sans">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 font-sans">
        <div id="main-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px] flex flex-col font-sans">
            <div class="p-6 border-b border-slate-100 bg-white flex flex-col md:flex-row md:items-center justify-between gap-4 font-sans">
                <div>
                    <h2 id="view-title" class="text-2xl font-bold text-slate-800 tracking-tight font-sans">Firmenübersicht</h2>
                    <p id="view-subtitle" class="text-slate-500 text-sm mt-0.5 font-sans">Daten werden synchronisiert...</p>
                </div>
                <div id="search-container" class="hidden relative font-sans">
                    <input type="text" id="company-search" placeholder="Suchen..." 
                        class="w-full md:w-80 pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-blue-500/20 font-sans">
                    <span class="absolute left-4 top-3 text-slate-400 font-sans font-bold">🔍</span>
                </div>
            </div>

            <div id="data-area" class="flex-1 relative font-sans">
                <div id="loading-state" class="hidden absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center font-sans">
                    <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full mb-3 font-sans"></div>
                    <p class="text-slate-600 font-semibold font-sans">Lade Daten...</p>
                </div>
                <div id="content-display" class="p-6 font-sans"></div>
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allCompanies = [];
        let siteId = ""; 

        document.getElementById('company-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (!allCompanies) return;
            const filtered = allCompanies.filter(c => (c.fields.Title || "").toLowerCase().includes(term) || (c.fields.Ort || "").toLowerCase().includes(term));
            renderCompanyTable(filtered);
        });

        async function init() {
            await msalInstance.initialize();
            const response = await msalInstance.handleRedirectPromise();
            if (response) msalInstance.setActiveAccount(response.account);
            else {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) msalInstance.setActiveAccount(accounts[0]);
            }
            updateUI();
        }

        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                startDataLoad();
            } else {
                document.getElementById('content-display').innerHTML = '<div class="py-20 text-center text-slate-400 italic font-sans">Bitte loggen Sie sich ein.</div>';
            }
        }

        document.getElementById('login-btn').onclick = () => msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
        document.getElementById('logout-btn').onclick = () => msalInstance.logoutRedirect();

        async function startDataLoad() {
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const token = tokenRes.accessToken;

                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const siteData = await siteRes.json();
                siteId = siteData.id;

                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields(select=id,Title,PLZ,Ort,Priorit_x00e4_t,TopKunde)`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                allCompanies = data.value || [];
                renderCompanyTable(allCompanies);
            } catch (err) { console.error(err); } finally { loader.classList.add('hidden'); }
        }

        function renderCompanyTable(items) {
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('view-subtitle').innerText = `${items.length} Unternehmen`;
            document.getElementById('search-container').classList.remove('hidden');

            let html = `<div class="overflow-x-auto"><table class='w-full text-left border-separate border-spacing-y-2'>
                <thead><tr class='text-slate-400 text-[10px] uppercase tracking-widest px-4'><th class='p-4 font-sans'>Firma</th><th class='p-4 text-center font-sans'>Prio</th><th class='p-4 text-right font-sans'>Ort</th></tr></thead><tbody>`;
            
            items.forEach(item => {
                const f = item.fields;
                let p = f.Priorit_x00e4_t || '-';
                if(p == "1") p = "A"; else if(p == "2") p = "B"; else if(p == "3") p = "C";

                html += `<tr onclick="loadContacts('${item.id}', '${(f.Title || 'Unbekannt').replace(/'/g, "\\'")}')" class='bg-white border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-300 cursor-pointer transition-all group font-sans'>
                    <td class='p-4 rounded-l-xl border-y border-l border-slate-100 font-bold font-sans text-slate-800'>${f.Title} ${f.TopKunde ? '<span class="text-yellow-500 font-sans ml-1">★</span>' : ''}</td>
                    <td class='p-4 border-y border-slate-100 text-center font-sans'><span class="prio-${p} px-3 py-1 rounded-lg text-[10px] font-black font-sans uppercase">${p}</span></td>
                    <td class='p-4 rounded-r-xl border-y border-r border-slate-100 text-slate-500 text-sm text-right font-sans'>${f.Ort || ''}</td></tr>`;
            });
            document.getElementById('content-display').innerHTML = html + "</tbody></table></div>";
        }

        async function loadContacts(companyId, companyName) {
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            document.getElementById('search-container').classList.add('hidden');
            
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontakte/items?expand=fields(select=id,Title,Vorname,Funktion,E_x002d_Mail,TelefonMobil,FirmaLookupId)&filter=fields/FirmaLookupId eq ${companyId}`;
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` } });
                const data = await response.json();
                renderContactCards(data.value || [], companyName);
            } catch (err) { console.error(err); } finally { loader.classList.add('hidden'); }
        }

        function renderContactCards(contacts, companyName) {
            document.getElementById('view-title').innerText = companyName;
            document.getElementById('view-subtitle').innerText = `${contacts.length} Kontakte`;
            let html = `<div class="mb-8 font-sans"><button onclick="showListView()" class="text-sm font-bold text-blue-600 hover:bg-blue-50 px-3 py-2 rounded-lg transition font-sans">← Zurück</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6 font-sans">`;
            
            contacts.forEach(c => {
                const f = c.fields;
                html += `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-b-4 border-b-blue-500 font-sans">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-400 font-sans italic">${(f.Vorname || '?').charAt(0)}${(f.Title || '?').charAt(0)}</div>
                        <div>
                            <h3 class="font-bold text-slate-800 font-sans leading-tight">${f.Vorname || ''} ${f.Title || ''}</h3>
                            <p class="text-blue-600 text-[11px] font-bold uppercase font-sans">${f.Funktion || '-'}</p>
                        </div>
                    </div>
                    <div class="space-y-2 pt-4 border-t border-slate-50 text-sm font-sans text-slate-600 mb-4">
                        <p>📧 ${f.E_x002d_Mail || '-'}</p>
                        <p>📱 ${f.TelefonMobil || '-'}</p>
                    </div>
                    <button onclick="loadHistory('${c.id}', '${f.Vorname} ${f.Title}')" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-600 text-xs font-bold py-2 rounded-lg transition font-sans border border-slate-200">
                        Historie anzeigen
                    </button>
                    <div id="history-${c.id}" class="mt-4 hidden font-sans"></div>
                </div>`;
            });
            document.getElementById('content-display').innerHTML = html + "</div>";
        }

        async function loadHistory(contactId, contactName) {
            const historyDiv = document.getElementById(`history-${contactId}`);
            if (!historyDiv.classList.contains('hidden')) {
                historyDiv.classList.add('hidden');
                return;
            }

            historyDiv.innerHTML = "<p class='text-[10px] animate-pulse py-2 font-sans'>Lade Notizen...</p>";
            historyDiv.classList.remove('hidden');

            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                
                // Wir filtern die Liste 'Kontaktnotizen' nach der KontaktpersonID (Lookup)
                const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontaktnotizen/items?expand=fields(select=Title,Details_x002f_Kontext,Status,Datum,KontaktpersonLookupId)&filter=fields/KontaktpersonLookupId eq ${contactId}&$orderby=fields/Datum desc`;
                
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` } });
                const data = await response.json();
                
                renderHistoryList(data.value || [], contactId);
            } catch (err) { historyDiv.innerHTML = "<p class='text-red-500 text-[10px] font-sans'>Fehler beim Laden.</p>"; }
        }

        function renderHistoryList(notes, contactId) {
            const historyDiv = document.getElementById(`history-${contactId}`);
            if (notes.length === 0) {
                historyDiv.innerHTML = "<p class='text-[10px] text-slate-400 italic py-2 font-sans'>Keine Notizen vorhanden.</p>";
                return;
            }

            let html = `<div class="timeline-line mt-2 space-y-4">`;
            notes.forEach(n => {
                const f = n.fields;
                const d = f.Datum ? new Date(f.Datum).toLocaleDateString('de-DE') : 'Kein Datum';
                html += `
                <div class="relative pl-6 font-sans">
                    <div class="absolute left-[-1.15rem] top-1 w-2.5 h-2.5 bg-blue-500 rounded-full border-2 border-white font-sans"></div>
                    <p class="text-[10px] font-bold text-slate-400 font-sans">${d} - ${f.Status || 'Status offen'}</p>
                    <p class="text-xs font-bold text-slate-800 font-sans mt-0.5">${f.Title || 'Notiz'}</p>
                    <p class="text-xs text-slate-600 font-sans mt-1 leading-relaxed">${f.Details_x002f_Kontext || '-'}</p>
                </div>`;
            });
            historyDiv.innerHTML = html + "</div>";
        }

        function showListView() { 
            document.getElementById('company-search').value = ""; 
            renderCompanyTable(allCompanies); 
        }
        init();
    </script>
</body>
</html>
