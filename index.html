<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-800 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold text-blue-400">bbz CRM</h1>
                <div id="nav-links" class="hidden flex gap-4 ml-6">
                    <button onclick="fetchCompanies()" class="bg-slate-700 px-3 py-1 rounded text-sm hover:bg-slate-600 transition">Firmen</button>
                </div>
            </div>
            <div id="auth-area">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm transition">Login mit M365</button>
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="username" class="text-sm border-r pr-3 border-slate-600 text-slate-300"></span>
                    <button id="logout-btn" class="text-xs text-slate-400 hover:text-white underline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div id="dashboard" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 min-h-[300px]">
            <div id="view-header" class="mb-6">
                <h2 id="view-title" class="text-2xl font-semibold text-gray-800">Willkommen</h2>
            </div>
            <div id="data-table" class="text-gray-600 py-4">
                Bitte loggen Sie sich ein, um die CRM-Daten aus SharePoint zu laden.
            </div>
        </div>
    </main>

    <script>
        // 1. MSAL KONFIGURATION (Ohne /v2.0/ am Ende der Authority!)
        const msalConfig = {
            auth: {
                clientId: "43485d45-3642-4f81-9f93-4a6f203666b6",
                authority: "https://login.microsoftonline.com/6401031d-b672-4d06-9c4c-7c08127387d8",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { 
                cacheLocation: "localStorage", 
                storeAuthStateInCookie: true 
            }
        };

        const siteId = "bbzsg.sharepoint.com,6123e75e-8557-4f6c-9f68-18e404bc0448,53f08f87-a068-45a9-bc26-216979603f5f";
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // 2. INITIALISIERUNG
        async function init() {
            try {
                // Notwendig für msal-browser 2.x+
                await msalInstance.initialize();
                
                const response = await msalInstance.handleRedirectPromise();
                
                if (response) {
                    msalInstance.setActiveAccount(response.account);
                } else {
                    const currentAccounts = msalInstance.getAllAccounts();
                    if (currentAccounts.length > 0) {
                        msalInstance.setActiveAccount(currentAccounts[0]);
                    }
                }
                updateUI();
            } catch (err) {
                console.error("Fehler bei der Initialisierung:", err);
                document.getElementById('data-table').innerHTML = `<span class="text-red-500">Fehler beim Starten: ${err.message}</span>`;
            }
        }

        // 3. UI UPDATE
        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('nav-links').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                document.getElementById('data-table').innerHTML = "Lade Firmendaten...";
                fetchCompanies();
            }
        }

        // 4. AUTH AKTIONEN
        document.getElementById('login-btn').onclick = async () => {
            try {
                await msalInstance.loginRedirect({
                    scopes: ["User.Read", "Sites.ReadWrite.All"],
                    prompt: "select_account"
                });
            } catch (err) {
                console.error(err);
            }
        };

        document.getElementById('logout-btn').onclick = () => {
            msalInstance.logoutRedirect();
        };

        // 5. DATEN LADEN (SharePoint/Graph)
        async function fetchCompanies() {
            const tableDiv = document.getElementById('data-table');
            try {
                const account = msalInstance.getActiveAccount();
                if (!account) return;

                const tokenRes = await msalInstance.acquireTokenSilent({
                    scopes: ["Sites.ReadWrite.All"],
                    account: account
                });

                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields`, {
                    headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` }
                });

                if (!response.ok) throw new Error("Kein Zugriff auf SharePoint Liste.");

                const data = await response.json();
                renderTable(data.value);
            } catch (err) {
                console.error(err);
                tableDiv.innerHTML = `<div class='text-red-500 bg-red-50 p-4 rounded'>Fehler beim Laden der Daten: ${err.message}</div>`;
            }
        }

        // 6. TABELLE ZEICHNEN
        function renderTable(items) {
            if (!items || items.length === 0) {
                document.getElementById('data-table').innerText = "Keine Firmen in der Liste gefunden.";
                return;
            }
            let html = `<table class='w-full text-left border-collapse'>
                <tr class='border-b text-gray-400 text-xs uppercase'><th class='p-3'>Firma</th><th class='p-3'>Ort</th></tr>`;
            items.forEach(item => {
                html += `<tr class='border-b hover:bg-gray-50 transition'>
                    <td class='p-3 font-bold text-slate-700'>${item.fields.Title || '-'}</td>
                    <td class='p-3 text-slate-600'>${item.fields.Ort || '-'}</td>
                </tr>`;
            });
            html += "</table>";
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('data-table').innerHTML = html;
        }

        // START
        init();
    </script>
</body>
</html>
