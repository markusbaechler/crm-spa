<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        .prio-A, .prio-1 { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        .prio-B, .prio-2 { background: #f3f4f6; color: #374151; border: 1px solid #9ca3af; }
        .prio-C, .prio-3 { background: #ffedd5; color: #9a3412; border: 1px solid #f97316; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-slate-900 text-white shadow-xl p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black text-blue-400 tracking-tighter cursor-pointer" onclick="showListView()">bbz CRM</h1>
            </div>
            <div id="auth-area">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-bold transition">Login mit M365</button>
                <div id="user-info" class="hidden flex items-center gap-4">
                    <span id="username" class="text-sm font-medium text-slate-400 border-r pr-4 border-slate-700"></span>
                    <button id="logout-btn" class="text-xs text-slate-400 hover:text-white underline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div id="main-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px] flex flex-col">
            <div class="p-6 border-b border-slate-100 bg-white flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 id="view-title" class="text-2xl font-bold text-slate-800 tracking-tight">Firmenübersicht</h2>
                    <p id="view-subtitle" class="text-slate-500 text-sm mt-0.5">Lade Daten...</p>
                </div>
                <div id="search-container" class="hidden relative">
                    <input type="text" id="company-search" placeholder="Suchen..." class="w-full md:w-80 pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                    <span class="absolute left-4 top-3 text-slate-400">🔍</span>
                </div>
            </div>

            <div id="data-area" class="flex-1 relative">
                <div id="loading-state" class="hidden absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center">
                    <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full mb-3"></div>
                    <p class="text-slate-600 font-semibold">Synchronisierung...</p>
                </div>
                <div id="content-display" class="p-6"></div>
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allCompanies = [];
        let siteId = ""; 

        async function init() {
            await msalInstance.initialize();
            const response = await msalInstance.handleRedirectPromise();
            if (response) msalInstance.setActiveAccount(response.account);
            else {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) msalInstance.setActiveAccount(accounts[0]);
            }
            updateUI();
        }

        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                startDataLoad();
            } else {
                document.getElementById('content-display').innerHTML = '<div class="py-20 text-center text-slate-400 italic">Bitte einloggen.</div>';
            }
        }

        document.getElementById('login-btn').onclick = () => msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
        document.getElementById('logout-btn').onclick = () => msalInstance.logoutRedirect();

        async function startDataLoad() {
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const token = tokenRes.accessToken;

                // 1. SCHRITT: Hole die echte technische Site-ID für "CRM"
                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const siteData = await siteRes.json();
                
                if (!siteData.id) {
                    throw new Error("SharePoint Site 'CRM' nicht gefunden. Prüfe den Pfad.");
                }
                siteId = siteData.id;

                // 2. SCHRITT: Lade die Firmen
                fetchCompanies(token);
            } catch (err) {
                document.getElementById('content-display').innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-lg"><b>Fehler:</b> ${err.message}</div>`;
                console.error(err);
            } finally { loader.classList.add('hidden'); }
        }

        async function fetchCompanies(token) {
            try {
                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields(select=id,Title,PLZ,Ort,Priorit_x00e4_t,TopKunde)`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.value || data.value.length === 0) {
                    document.getElementById('content-display').innerHTML = `<div class="py-20 text-center text-slate-400">Site gefunden, aber die Liste 'Firmen' ist leer oder der Name stimmt nicht.</div>`;
                    return;
                }

                allCompanies = data.value;
                renderCompanyTable(allCompanies);
            } catch (err) {
                console.error(err);
            }
        }

        function renderCompanyTable(items) {
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('view-subtitle').innerText = `${items.length} Unternehmen gefunden`;
            document.getElementById('search-container').classList.remove('hidden');

            let html = `<div class="overflow-x-auto"><table class='w-full text-left border-separate border-spacing-y-2'>
                <thead><tr class='text-slate-400 text-[10px] uppercase tracking-widest px-4'><th class='p-4'>Firma</th><th class='p-4 text-center'>Prio</th><th class='p-4 text-right'>Ort</th></tr></thead><tbody>`;
            
            items.forEach(item => {
                const f = item.fields;
                let p = f.Priorit_x00e4_t || '-';
                if(p == "1") p = "A"; else if(p == "2") p = "B"; else if(p == "3") p = "C";

                html += `
                <tr onclick="loadContacts('${item.id}', '${(f.Title || 'Unbekannt').replace(/'/g, "\\'")}')" 
                    class='bg-white border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-300 cursor-pointer transition-all group'>
                    <td class='p-4 rounded-l-xl border-y border-l border-slate-100 group-hover:border-blue-100'>
                        <span class="font-bold text-slate-800 group-hover:text-blue-700 transition-colors">${f.Title || 'N/A'}</span>
                        ${f.TopKunde ? '<span class="text-yellow-500 ml-1">★</span>' : ''}
                    </td>
                    <td class='p-4 border-y border-slate-100 group-hover:border-blue-100 text-center'>
                        <span class="prio-${p} px-3 py-1 rounded-lg text-[10px] font-black">${p}</span>
                    </td>
                    <td class='p-4 rounded-r-xl border-y border-r border-slate-100 group-hover:border-blue-100 text-slate-500 text-sm text-right'>
                        ${f.PLZ || ''} ${f.Ort || ''}
                    </td>
                </tr>`;
            });
            document.getElementById('content-display').innerHTML = html + "</tbody></table></div>";
        }

        async function loadContacts(id, name) {
            // Platzhalter für Kontakt-Laden
            alert("Lade Kontakte für " + name);
        }

        function showListView() { renderCompanyTable(allCompanies); }
        init();
    </script>
</body>
</html>
