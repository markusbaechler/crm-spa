<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
</head>
<body class="bg-gray-100">

<div id="app" class="hidden">

    <!-- NAV -->
    <nav class="bg-white shadow p-4 flex gap-4">
        <button onclick="navigate('dashboard')" class="nav-btn">Dashboard</button>
        <button onclick="navigate('firmen')" class="nav-btn">Firmen</button>
        <button onclick="navigate('kontakte')" class="nav-btn">Kontakte</button>
        <button onclick="navigate('planung')" class="nav-btn">Planung</button>
    </nav>

    <!-- CONTENT -->
    <div id="content" class="p-6"></div>

</div>

<!-- LOGIN -->
<div id="login" class="flex items-center justify-center h-screen">
    <button onclick="login()" class="bg-blue-600 text-white px-6 py-3 rounded">
        Login mit Microsoft
    </button>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded w-full max-w-lg">
        <div id="modalContent"></div>
        <button onclick="closeModal()" class="mt-4 bg-gray-300 px-4 py-2 rounded">Schliessen</button>
    </div>
</div>

<script src="app.js"></script>

<style>
.nav-btn {
    padding: 8px 16px;
    background: #f3f4f6;
    border-radius: 6px;
}
.nav-btn:hover {
    background: #e5e7eb;
}
</style>

</body>
</html>
