<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-800 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold text-blue-400">bbz CRM</h1>
                <div id="nav-links" class="hidden flex gap-4 ml-6">
                    <button onclick="fetchCompanies()" class="bg-slate-700 px-3 py-1 rounded text-sm hover:bg-slate-600 transition">Firmen</button>
                </div>
            </div>
            <div id="auth-area">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm transition">Login mit M365</button>
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="username" class="text-sm border-r pr-3 border-slate-600 text-slate-300"></span>
                    <button id="logout-btn" class="text-xs text-slate-400 hover:text-white underline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div id="dashboard" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 min-h-[400px]">
            <div id="view-header" class="mb-6">
                <h2 id="view-title" class="text-2xl font-semibold text-gray-800">Willkommen</h2>
            </div>
            <div id="data-table" class="text-gray-600 py-4">
                Bitte loggen Sie sich ein.
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        // Site-Pfad für deine CRM Site
        const SITE_PATH = "bbzsg.sharepoint.com:/sites/CRM";
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        async function init() {
            await msalInstance.initialize();
            const response = await msalInstance.handleRedirectPromise();
            if (response) msalInstance.setActiveAccount(response.account);
            else {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) msalInstance.setActiveAccount(accounts[0]);
            }
            updateUI();
        }

        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('nav-links').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                fetchCompanies();
            }
        }

        document.getElementById('login-btn').onclick = () => msalInstance.loginRedirect({ scopes: ["User.Read", "Sites.Read.All"] });
        document.getElementById('logout-btn').onclick = () => msalInstance.logoutRedirect();

        async function fetchCompanies() {
            const tableDiv = document.getElementById('data-table');
            tableDiv.innerHTML = "<p class='animate-pulse'>Lade Firmendaten aus SharePoint...</p>";
            
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({
                    scopes: ["Sites.Read.All"],
                    account: account
                });

                // Abruf über den Site-Pfad
                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_PATH}/lists/Firmen/items?expand=fields(select=Title,PLZ,Ort,Land)`, {
                    headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` }
                });

                if (!response.ok) throw new Error("Fehler beim Zugriff auf die Liste. Prüfen Sie die Berechtigungen.");

                const data = await response.json();
                renderTable(data.value);
            } catch (err) {
                tableDiv.innerHTML = `<div class='text-red-500 bg-red-50 p-4 rounded'>${err.message}</div>`;
            }
        }

        function renderTable(items) {
            if (!items || items.length === 0) {
                document.getElementById('data-table').innerText = "Keine Einträge gefunden.";
                return;
            }
            let html = `<table class='w-full text-left border-collapse'>
                <tr class='border-b text-gray-400 text-xs uppercase'><th class='p-3'>Firma</th><th class='p-3'>PLZ</th><th class='p-3'>Ort</th></tr>`;
            items.forEach(item => {
                const f = item.fields;
                html += `<tr class='border-b hover:bg-gray-50 transition'>
                    <td class='p-3 font-bold text-slate-700'>${f.Title || '-'}</td>
                    <td class='p-3 text-slate-600'>${f.PLZ || '-'}</td>
                    <td class='p-3 text-slate-600'>${f.Ort || '-'}</td>
                </tr>`;
            });
            html += "</table>";
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('data-table').innerHTML = html;
        }

        init();
    </script>
</body>
</html>
