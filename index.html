<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-800 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold tracking-tight text-blue-400">bbz CRM</h1>
                <div id="nav-links" class="hidden flex gap-4 text-sm ml-6">
                    <button onclick="fetchCompanies()" class="bg-slate-700 px-3 py-1 rounded hover:bg-slate-600">Firmen</button>
                    <button class="px-3 py-1 opacity-50 cursor-not-allowed">Kontakte</button>
                </div>
            </div>
            <div id="auth-area">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm transition">Login mit M365</button>
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="username" class="text-sm border-r pr-3 border-slate-600"></span>
                    <button onclick="logout()" class="text-xs text-slate-400 hover:text-white underline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div id="status-msg"></div>
        
        <div id="dashboard" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <div id="view-header" class="flex justify-between items-center mb-6">
                <h2 id="view-title" class="text-2xl font-semibold text-gray-800">Willkommen</h2>
            </div>
            
            <div id="data-table" class="overflow-x-auto text-gray-600">
                Bitte loggen Sie sich ein, um die CRM-Daten aus SharePoint zu laden.
            </div>
        </div>
    </main>

    <script>
        // --- AUTH KONFIGURATION (VON DEINEM SCREENSHOT) ---
        const msalConfig = {
            auth: {
                clientId: "43485d45-3642-4f81-9f93-4a6f203666b6",
                authority: "https://login.microsoftonline.com/6401031d-b672-4d06-9c4c-7c08127387d8",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "sessionStorage" }
        };

        // Deine spezifische Site-ID
        const siteId = "bbzsg.sharepoint.com,6123e75e-8557-4f6c-9f68-18e404bc0448,53f08f87-a068-45a9-bc26-216979603f5f";
        
        const loginRequest = { scopes: ["User.Read", "Sites.ReadWrite.All"] };
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // Login Funktion
        document.getElementById('login-btn').onclick = async () => {
            try {
                const response = await msalInstance.loginPopup(loginRequest);
                msalInstance.setActiveAccount(response.account);
                handleAfterLogin();
            } catch (err) {
                console.error("Login fehlgeschlagen:", err);
                alert("Fehler beim Login: " + err.message);
            }
        };

        function handleAfterLogin() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('nav-links').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                fetchCompanies(); // Automatisch Firmen laden
            }
        }

        async function getValidToken() {
            const request = { 
                scopes: ["Sites.ReadWrite.All"], 
                account: msalInstance.getActiveAccount() 
            };
            const response = await msalInstance.acquireTokenSilent(request);
            return response.accessToken;
        }

        // --- SHAREPOINT DATEN LADEN ---
        async function fetchCompanies() {
            const tableDiv = document.getElementById('data-table');
            tableDiv.innerHTML = "<p class='animate-pulse text-blue-600'>Verbindung zu SharePoint wird hergestellt...</p>";
            
            try {
                const token = await getValidToken();
                // Wir nutzen den Listennamen 'Firmen' laut deiner Excel
                const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("Liste 'Firmen' nicht gefunden oder Zugriff verweigert.");

                const data = await response.json();
                renderTable(data.value);
            } catch (err) {
                tableDiv.innerHTML = `
                    <div class='bg-red-50 p-4 rounded text-red-700'>
                        <strong>Fehler beim Laden:</strong> ${err.message}<br>
                        <small>Tipp: Stelle sicher, dass die Liste exakt "Firmen" heißt.</small>
                    </div>`;
            }
        }

        function renderTable(items) {
            if (items.length === 0) {
                document.getElementById('data-table').innerHTML = "Keine Daten in der Liste 'Firmen' gefunden.";
                return;
            }

            let html = `
                <table class='w-full text-left border-collapse mt-4'>
                    <thead>
                        <tr class='border-b bg-gray-50 text-gray-500 text-xs uppercase tracking-wider'>
                            <th class='p-3 font-semibold'>Firmenname</th>
                            <th class='p-3 font-semibold'>Ort</th>
                            <th class='p-3 font-semibold'>Priorität</th>
                        </tr>
                    </thead>
                    <tbody class='text-sm text-gray-700'>`;
            
            items.forEach(item => {
                const f = item.fields;
                // Falls die Spaltennamen in SharePoint anders sind (interner Name), hier anpassen
                html += `
                    <tr class='border-b hover:bg-blue-50 transition-colors'>
                        <td class='p-3 font-bold text-gray-900'>${f.Title || 'Unbekannt'}</td>
                        <td class='p-3'>${f.Ort || '-'}</td>
                        <td class='p-3'>
                            <span class='px-2 py-1 rounded-full text-[10px] font-bold ${f.Priorit_x005f_x00e4_t === 'A' ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600'}'>
                                ${f.Priorit_x005f_x00e4_t || '-'}
                            </span>
                        </td>
                    </tr>`;
            });
            
            html += "</tbody></table>";
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('data-table').innerHTML = html;
        }

        function logout() {
            msalInstance.logoutPopup().then(() => location.reload());
        }

        // Auto-Check beim Laden der Seite
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
            msalInstance.setActiveAccount(accounts[0]);
            handleAfterLogin();
        }
    </script>
</body>
</html>
