<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>bbz CRM - DEBUG MODE</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        body { background: #0f172a; color: #00ff00; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 15px; margin-bottom: 20px; background: #1e293b; }
        h2 { color: #fff; border-bottom: 1px solid #fff; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; }
        button { background: #2563eb; color: white; padding: 10px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>bbz CRM - Diagnosetool</h1>
    <button id="login-btn">1. Login & Analyse starten</button>

    <div id="output">
        <p>Warte auf Login...</p>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        document.getElementById('login-btn').onclick = async () => {
            const output = document.getElementById('output');
            output.innerHTML = "<p>Initialisiere MSAL...</p>";
            
            try {
                const loginRes = await msalInstance.loginPopup({ scopes: ["Sites.Read.All"] });
                const tokenRes = await msalInstance.acquireTokenSilent({ 
                    scopes: ["Sites.Read.All"], 
                    account: loginRes.account 
                });
                const token = tokenRes.accessToken;

                output.innerHTML = "<p>Suche Site ID...</p>";
                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const site = await siteRes.json();
                const siteId = site.id;

                output.innerHTML = "<p>Hole Daten von 'Compendio'...</p>";
                
                // 1. Hole alle Firmen, um die ID von Compendio zu finden
                const compRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const compData = await compRes.json();
                const compendio = compData.value.find(f => f.fields.Title.includes("Compendio"));

                // 2. Hole EINEN Kontakt (den ersten den du findest)
                const contRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontakte/items?expand=fields&top=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const contData = await contRes.json();

                // AUSGABE AUF DEM BILDSCHIRM
                output.innerHTML = `
                    <div class="box">
                        <h2>1. Compendio Bildungsmedien AG - Rohdaten</h2>
                        <pre>${JSON.stringify(compendio, null, 2)}</pre>
                        <p>WICHTIG: Die ID dieser Firma ist: <strong>${compendio.id}</strong></p>
                    </div>

                    <div class="box">
                        <h2>2. Beispiel-Kontakt - Rohdaten</h2>
                        <p>Hier sehen wir, wie SharePoint die Felder wirklich benennt:</p>
                        <pre>${JSON.stringify(contData.value[0], null, 2)}</pre>
                    </div>
                `;

                console.log("Compendio Data:", compendio);
                console.log("First Contact Data:", contData.value[0]);

            } catch (err) {
                output.innerHTML = `<p style="color:red">FEHLER: ${err.message}</p><pre>${JSON.stringify(err, null, 2)}</pre>`;
            }
        };
    </script>
</body>
</html>
