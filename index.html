<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        /* Prioritäten-Farben */
        .prio-A, .prio-1 { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        .prio-B, .prio-2 { background: #f3f4f6; color: #374151; border: 1px solid #9ca3af; }
        .prio-C, .prio-3 { background: #ffedd5; color: #9a3412; border: 1px solid #f97316; }
        
        /* Custom Scrollbar für schickeres Aussehen */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-slate-900 text-white shadow-xl p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black text-blue-400 tracking-tighter cursor-pointer" onclick="showListView()">bbz CRM</h1>
                <div id="nav-links" class="hidden flex gap-2">
                    <button onclick="showListView()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-sm font-medium border border-slate-700">🏢 Firmenliste</button>
                </div>
            </div>
            <div id="auth-area">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-bold transition shadow-lg shadow-blue-900/20">Login mit M365</button>
                <div id="user-info" class="hidden flex items-center gap-4">
                    <span id="username" class="text-sm font-medium text-slate-400 border-r pr-4 border-slate-700"></span>
                    <button id="logout-btn" class="text-xs text-slate-400 hover:text-white underline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div id="main-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px] flex flex-col">
            
            <div class="p-6 border-b border-slate-100 bg-white flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 id="view-title" class="text-2xl font-bold text-slate-800 tracking-tight">Willkommen</h2>
                    <p id="view-subtitle" class="text-slate-500 text-sm mt-0.5">Bitte loggen Sie sich ein.</p>
                </div>
                
                <div id="search-container" class="hidden relative">
                    <input type="text" id="company-search" placeholder="Firma oder Ort suchen..." 
                        class="w-full md:w-80 pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition text-sm">
                    <span class="absolute left-4 top-3 text-slate-400">🔍</span>
                </div>
            </div>

            <div id="data-area" class="flex-1 relative">
                <div id="loading-state" class="hidden absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center">
                    <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full mb-3"></div>
                    <p class="text-slate-600 font-semibold animate-pulse">Synchronisierung...</p>
                </div>

                <div id="content-display" class="p-6">
                    <div class="py-20 text-center">
                        <p class="text-slate-400">Keine Daten geladen. Bitte nutzen Sie den Login oben rechts.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const SITE_PATH = "bbzsg.sharepoint.com:/sites/CRM";
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allCompanies = [];

        async function init() {
            await msalInstance.initialize();
            const response = await msalInstance.handleRedirectPromise();
            if (response) msalInstance.setActiveAccount(response.account);
            else {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) msalInstance.setActiveAccount(accounts[0]);
            }
            updateUI();
        }

        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('nav-links').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                fetchCompanies();
            }
        }

        document.getElementById('login-btn').onclick = () => msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
        document.getElementById('logout-btn').onclick = () => msalInstance.logoutRedirect();

        // Suche-Logik
        document.getElementById('company-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allCompanies.filter(c => 
                (c.fields.Title && c.fields.Title.toLowerCase().includes(term)) ||
                (c.fields.Ort && c.fields.Ort.toLowerCase().includes(term))
            );
            renderCompanyTable(filtered);
        };

        async function fetchCompanies() {
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_PATH}/lists/Firmen/items?expand=fields(select=id,Title,PLZ,Ort,Priorit_x00e4_t,TopKunde)`, {
                    headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` }
                });
                const data = await response.json();
                allCompanies = data.value;
                renderCompanyTable(allCompanies);
            } catch (err) {
                document.getElementById('content-display').innerHTML = `<p class="text-red-500">${err.message}</p>`;
            } finally { loader.classList.add('hidden'); }
        }

        function renderCompanyTable(items) {
            document.getElementById('view-title').innerText = "Firmenübersicht";
            document.getElementById('view-subtitle').innerText = `${items.length} Unternehmen`;
            document.getElementById('search-container').classList.remove('hidden');

            let html = `<div class="overflow-x-auto"><table class='w-full text-left border-separate border-spacing-y-2'>
                <thead><tr class='text-slate-400 text-[10px] uppercase tracking-widest px-4'><th class='p-4'>Firma</th><th class='p-4 text-center'>Prio</th><th class='p-4'>PLZ / Ort</th></tr></thead><tbody>`;
            
            items.forEach(item => {
                const f = item.fields;
                let p = f.Priorit_x00e4_t || '-';
                if(p == "1") p = "A"; else if(p == "2") p = "B"; else if(p == "3") p = "C";

                html += `
                <tr onclick="fetchContactsForCompany('${item.id}', '${f.Title.replace(/'/g, "\\'")}')" 
                    class='bg-white border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-300 cursor-pointer transition-all group'>
                    <td class='p-4 rounded-l-xl border-y border-l border-slate-100 group-hover:border-blue-100'>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-slate-800 group-hover:text-blue-700 transition-colors">${f.Title}</span>
                            ${f.TopKunde ? '<span title="Top Kunde" class="text-yellow-500">★</span>' : ''}
                        </div>
                    </td>
                    <td class='p-4 border-y border-slate-100 group-hover:border-blue-100 text-center'>
                        <span class="prio-${p} px-3 py-1 rounded-lg text-[10px] font-black tracking-tighter">${p}</span>
                    </td>
                    <td class='p-4 rounded-r-xl border-y border-r border-slate-100 group-hover:border-blue-100 text-slate-500 text-sm'>
                        ${f.PLZ || ''} ${f.Ort || ''}
                    </td>
                </tr>`;
            });
            document.getElementById('content-display').innerHTML = html + "</tbody></table></div>";
        }

        async function fetchContactsForCompany(companyId, companyName) {
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            document.getElementById('search-container').classList.add('hidden');
            
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                
                // WICHTIG: Filter auf FirmaLookupId
                const url = `https://graph.microsoft.com/v1.0/sites/${SITE_PATH}/lists/Kontakte/items?expand=fields(select=Title,Vorname,Funktion,E_x002d_Mail,TelefonMobil,FirmaLookupId)&filter=fields/FirmaLookupId eq ${companyId}`;
                
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${tokenRes.accessToken}` } });
                const data = await response.json();
                renderContactCards(data.value, companyName);
            } catch (err) {
                document.getElementById('content-display').innerHTML = `<p class="text-red-500">${err.message}</p>`;
            } finally { loader.classList.add('hidden'); }
        }

        function renderContactCards(contacts, companyName) {
            document.getElementById('view-title').innerText = companyName;
            document.getElementById('view-subtitle').innerText = `${contacts.length} Kontakte`;
            
            let html = `
                <div class="mb-8">
                    <button onclick="showListView()" class="flex items-center gap-2 text-sm font-bold text-blue-600 hover:bg-blue-50 px-3 py-2 rounded-lg transition">
                        ← Zurück zur Firmenliste
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;

            if(contacts.length === 0) {
                html += `<div class="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-2xl">
                            <p class="text-slate-400">Keine Kontakte für dieses Unternehmen gefunden.</p>
                         </div>`;
            }

            contacts.forEach(c => {
                const f = c.fields;
                const initialen = `${(f.Vorname || '?').charAt(0)}${(f.Title || '?').charAt(0)}`;
                html += `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-lg transition-all border-b-4 border-b-blue-500">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-400 text-sm italic">${initialen}</div>
                        <div>
                            <h3 class="font-bold text-slate-800 leading-tight">${f.Vorname || ''} ${f.Title || ''}</h3>
                            <p class="text-blue-600 text-[11px] font-bold uppercase tracking-wider">${f.Funktion || 'Keine Funktion'}</p>
                        </div>
                    </div>
                    <div class="space-y-2 pt-4 border-t border-slate-50 text-sm">
                        <div class="flex items-center gap-3 text-slate-600">
                            <span class="w-5 text-center opacity-50">📧</span>
                            <a href="mailto:${f.E_x002d_Mail}" class="truncate hover:text-blue-600 underline decoration-blue-200">${f.E_x002d_Mail || '-'}</a>
                        </div>
                        <div class="flex items-center gap-3 text-slate-600">
                            <span class="w-5 text-center opacity-50">📱</span>
                            <span>${f.TelefonMobil || '-'}</span>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('content-display').innerHTML = html + "</div>";
        }

        function showListView() {
            document.getElementById('company-search').value = "";
            renderCompanyTable(allCompanies);
        }

        init();
    </script>
</body>
</html>
