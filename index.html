<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM bbz (light)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        /* Hilfsklassen für das Modal */
        .modal-active { overflow: hidden; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-slate-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-8">
                <span class="text-xl font-bold tracking-tight text-blue-400">CRM <span class="text-white">bbz</span></span>
                <div class="flex gap-4">
                    <button onclick="loadFirms()" class="px-3 py-2 rounded-md hover:bg-slate-700 transition">Firmen</button>
                    <button onclick="loadAllContacts()" class="px-3 py-2 rounded-md hover:bg-slate-700 transition">Kontakte</button>
                </div>
            </div>
            <div id="auth-status" class="text-sm text-gray-300">
                <button onclick="login()" id="btn-login" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded">Login</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="main-content" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <div class="text-center py-20">
                <h2 class="text-2xl text-gray-400">Bitte melden Sie sich an, um Daten zu laden.</h2>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <div id="modal-body-content">
                </div>
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        // Kleiner Helper für die Initialisierung, falls die app.js geladen ist
        document.addEventListener('DOMContentLoaded', () => {
            console.log("CRM App bereit.");
            // Hier könnte man prüfen, ob der User bereits eingeloggt ist
        });
    </script>
</body>
</html>
