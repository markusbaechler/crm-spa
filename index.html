<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbz CRM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .prio-A { border-left: 4px solid #f59e0b; }
        .timeline-line { border-left: 2px solid #334155; margin-left: 10px; }
    </style>
</head>
<body class="min-h-screen italic">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-400 tracking-tighter cursor-pointer" onclick="location.reload()">bbz CRM</h1>
            <div id="auth-area" class="flex items-center gap-4">
                <span id="app-status" class="text-[10px] text-slate-500 font-mono uppercase">Warte...</span>
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg text-sm font-bold transition shadow-lg">Login</button>
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="username" class="text-xs text-slate-400 font-bold border-r pr-3 border-slate-700"></span>
                    <button id="logout-btn" class="text-xs text-slate-500 hover:text-white underline font-sans">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-6 px-4 grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="card-dark p-4 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-500 font-bold">A-Firmen</p><p id="stat-a" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-500 font-bold">B-Firmen</p><p id="stat-b" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-500 font-bold">C-Firmen</p><p id="stat-c" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center border-b-2 border-b-red-500"><p class="text-[10px] uppercase text-red-400 font-bold">Tasks Offen</p><p id="stat-tasks" class="text-2xl font-black">-</p></div>
        <div class="card-dark p-4 rounded-xl text-center border-b-2 border-b-blue-500"><p class="text-[10px] uppercase text-blue-400 font-bold">Top-Kunden ★</p><p id="stat-top" class="text-2xl font-black">-</p></div>
    </div>

    <main class="container mx-auto mt-6 p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 space-y-4">
            <input type="text" id="comp-search" placeholder="Firma suchen..." class="card-dark w-full rounded-xl px-4 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500 text-white italic">
            <div id="company-list" class="space-y-2 max-h-[600px] overflow-y-auto pr-2">
                <div class="text-center py-10 text-slate-600 italic text-sm">Bitte Login klicken</div>
            </div>
        </div>
        <div id="detail-view" class="lg:col-span-9 space-y-6">
            <div class="card-dark p-20 rounded-2xl text-center text-slate-500 italic">Dashboard bereit.</div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            },
            cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
        };

        let msalInstance;
        const status = (txt) => document.getElementById('app-status').innerText = txt;

        async function startApp() {
            status("Boot...");
            try {
                // Klassische Initialisierung für maximale Browser-Kompatibilität
                msalInstance = new msal.PublicClientApplication(msalConfig);
                
                // Wir erzwingen keine asynchrone Initialisierung, falls diese blockiert wird
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    msalInstance.setActiveAccount(accounts[0]);
                    updateUI();
                }
                status("Bereit");
            } catch (err) {
                console.error(err);
                status("Fehler");
            }
        }

        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username').innerText = account.name;
                loadData();
            }
        }

        document.getElementById('login-btn').onclick = async () => {
            status("Login...");
            try {
                const result = await msalInstance.loginPopup({
                    scopes: ["Sites.Read.All", "Sites.ReadWrite.All"],
                    prompt: "select_account"
                });
                msalInstance.setActiveAccount(result.account);
                updateUI();
                status("Online");
            } catch (err) {
                console.error(err);
                status("Abbruch");
            }
        };

        document.getElementById('logout-btn').onclick = () => {
            sessionStorage.clear();
            location.reload();
        };

        async function loadData() {
            try {
                const account = msalInstance.getActiveAccount();
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: account });
                const token = tokenRes.accessToken;

                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", { headers: { 'Authorization': `Bearer ${token}` } });
                const siteData = await siteRes.json();
                const siteId = siteData.id;

                const compRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields`, { headers: { 'Authorization': `Bearer ${token}` } });
                const compData = await compRes.json();
                const companies = compData.value || [];
                
                // Stats & Liste rendern
                document.getElementById('stat-a').innerText = companies.filter(c => c.fields.Priorit_x00e4_t == '1').length;
                document.getElementById('stat-top').innerText = companies.filter(c => c.fields.TopKunde).length;
                
                document.getElementById('company-list').innerHTML = companies.map(c => `
                    <div class="card-dark p-3 rounded-xl cursor-pointer hover:bg-slate-800 text-sm font-bold italic">
                        ${c.fields.Title}
                    </div>
                `).join('');
            } catch (err) { status("API Fehler"); }
        }

        startApp();
    </script>
</body>
</html>
