<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>bbz CRM - DEBUGER</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        body { background: #020617; color: #38bdf8; font-family: monospace; padding: 40px; }
        .status-box { border: 1px solid #1e293b; padding: 20px; border-radius: 12px; background: #0f172a; }
        button { background: #2563eb; color: white; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
    </style>
</head>
<body>

    <div class="status-box">
        <h1 style="color: white;">bbz CRM Diagnose-Modus</h1>
        <p>Dieses Tool analysiert die SharePoint-Struktur und loggt alles in die Konsole.</p>
        <button id="start-btn">Analyse starten (Login erforderlich)</button>
        <div id="log" style="margin-top: 20px; line-height: 1.6;"></div>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const logUI = (msg, type = '') => {
            const div = document.getElementById('log');
            div.innerHTML += `<p class="${type}">> ${msg}</p>`;
        };

        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('log').innerHTML = "";
            logUI("Starte Login...");

            try {
                const loginRes = await msalInstance.loginPopup({ scopes: ["Sites.Read.All"] });
                logUI("Login erfolgreich: " + loginRes.account.username, "success");

                const tokenRes = await msalInstance.acquireTokenSilent({ 
                    scopes: ["Sites.Read.All"], 
                    account: loginRes.account 
                });
                const token = tokenRes.accessToken;

                // 1. Site Info
                logUI("Hole Site-ID...");
                const siteRes = await fetch("https://graph.microsoft.com/v1.0/sites/bbzsg.sharepoint.com:/sites/CRM", {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const site = await siteRes.json();
                const siteId = site.id;
                console.log("SITE INFO:", site);

                // 2. Firma "Compendio" finden
                logUI("Suche Firma 'Compendio'...");
                const compRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Firmen/items?expand=fields`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const compData = await compRes.json();
                const compendio = compData.value.find(f => f.fields.Title.includes("Compendio"));
                
                console.log("--- FIRMA GEFUNDEN (ROHDATEN) ---");
                console.dir(compendio.fields);
                logUI(`Firma gefunden: ${compendio.fields.Title} (ID: ${compendio.id})`, "success");

                // 3. Kontakte laden (Alle)
                logUI("Lade Kontakte-Liste zur Analyse...");
                const contRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Kontakte/items?expand=fields`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const contData = await contRes.json();
                
                console.log("--- ERSTER KONTAKT AUS DER LISTE ---");
                console.dir(contData.value[0].fields);

                // 4. Teste den Filter
                const searchId = compendio.id;
                const matches = contData.value.filter(c => {
                    // Wir checken hier manuell alle möglichen Felder
                    const f = c.fields;
                    return f.FirmaId == searchId || f.FirmaLookupId == searchId || (f.Firma && f.Firma.LookupId == searchId);
                });

                logUI(`Filtertest: Suche nach ID ${searchId}...`, "");
                logUI(`Ergebnis: ${matches.length} Kontakte gefunden.`, matches.length > 0 ? "success" : "error");

                console.log("--- ALLE KONTAKTE (ÜBERSICHT) ---");
                console.table(contData.value.map(c => ({
                    Name: c.fields.Title,
                    FirmaId: c.fields.FirmaId,
                    FirmaLookupId: c.fields.FirmaLookupId,
                    FirmaObject: c.fields.Firma ? "JA" : "NEIN"
                })));

                logUI("Analyse beendet. Bitte F12 drücken und Konsole prüfen!", "success");

            } catch (err) {
                logUI("FEHLER: " + err.message, "error");
                console.error(err);
            }
        };
    </script>
</body>
</html>
