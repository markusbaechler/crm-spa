<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM SPA</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MSAL -->
    <script defer src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-800">

<div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold">CRM SPA</h1>
            <p class="text-slate-600">GitHub Pages + Microsoft Login + SharePoint REST</p>
        </div>

        <div class="flex gap-2">
            <button id="btnLogin" class="px-4 py-2 rounded-xl bg-blue-600 text-white">
                Login
            </button>

            <button id="btnLoad" class="px-4 py-2 rounded-xl bg-emerald-600 text-white hidden">
                Kontakte laden
            </button>

            <button id="btnLogout" class="px-4 py-2 rounded-xl bg-slate-700 text-white hidden">
                Logout
            </button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- STATUS -->
        <div class="bg-white rounded-2xl p-5 shadow">
            <h2 class="text-xl font-semibold mb-4">Status</h2>

            <p><b>Site:</b><br>
                https://bbzsg.sharepoint.com/sites/CRM
            </p>

            <p class="mt-3"><b>Benutzer:</b><br>
                <span id="userInfo">nicht angemeldet</span>
            </p>

            <p class="mt-3"><b>Letzte Aktion:</b><br>
                <span id="statusInfo">bereit</span>
            </p>

            <h3 class="mt-6 font-semibold">Debug Log</h3>
            <div id="debug" class="mt-2 bg-slate-900 text-green-400 text-xs p-3 rounded-xl h-48 overflow-auto"></div>
        </div>

        <!-- CONTACTS -->
        <div class="lg:col-span-2 bg-white rounded-2xl p-5 shadow">
            <h2 class="text-xl font-semibold mb-3">Contacts</h2>

            <table class="w-full text-sm">
                <thead class="bg-slate-100">
                <tr>
                    <th class="p-2 text-left">ID</th>
                    <th class="p-2 text-left">Name</th>
                    <th class="p-2 text-left">Firma</th>
                    <th class="p-2 text-left">E-Mail</th>
                    <th class="p-2 text-left">Telefon</th>
                </tr>
                </thead>
                <tbody id="contactsTable">
                <tr>
                    <td colspan="5" class="p-3 text-slate-500">Noch keine Daten geladen.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script>
const CONFIG = {
    clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
    tenantId: "3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
    siteUrl: "https://bbzsg.sharepoint.com/sites/CRM",
    scopes: ["https://bbzsg.sharepoint.com/AllSites.Read"]
};

let msalInstance;
let account;

function log(msg) {
    const el = document.getElementById("debug");
    el.innerHTML += msg + "<br>";
    el.scrollTop = el.scrollHeight;
}

function setStatus(msg) {
    document.getElementById("statusInfo").innerText = msg;
}

// INIT MSAL
async function initMsal() {
    msalInstance = new msal.PublicClientApplication({
        auth: {
            clientId: CONFIG.clientId,
            authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`
        }
    });
}

// LOGIN
async function login() {
    try {
        const res = await msalInstance.loginPopup({
            scopes: CONFIG.scopes
        });

        account = res.account;

        document.getElementById("userInfo").innerText = account.username;
        document.getElementById("btnLogin").classList.add("hidden");
        document.getElementById("btnLoad").classList.remove("hidden");
        document.getElementById("btnLogout").classList.remove("hidden");

        log("Login erfolgreich");

    } catch (e) {
        log("Login Fehler: " + e);
    }
}

// TOKEN
async function getToken() {
    const res = await msalInstance.acquireTokenSilent({
        scopes: CONFIG.scopes,
        account: account
    });

    return res.accessToken;
}

// LOAD CONTACTS (FIXED)
async function loadContacts() {
    try {
        setStatus("lade Kontakte...");

        const token = await getToken();

        const response = await fetch(
            `${CONFIG.siteUrl}/_api/web/lists/getbytitle('Contacts')/items`,
            {
                headers: {
                    Authorization: `Bearer ${token}`,
                    Accept: "application/json;odata=nometadata"
                }
            }
        );

        const data = await response.json();

        log("API Response erhalten");

        // 🔥 UNIVERSAL FIX
        const items = data.value || data.d?.results || [];

        log("Items: " + items.length);

        renderContacts(items);

        setStatus("fertig");

    } catch (e) {
        log("Fehler: " + e);
        setStatus("Fehler");
    }
}

// RENDER
function renderContacts(items) {
    const table = document.getElementById("contactsTable");
    table.innerHTML = "";

    if (!items.length) {
        table.innerHTML = `
            <tr>
                <td colspan="5" class="p-3 text-slate-500">Keine Kontakte gefunden.</td>
            </tr>
        `;
        return;
    }

    items.forEach(c => {
        table.innerHTML += `
            <tr class="border-b">
                <td class="p-2">${c.Id ?? ""}</td>
                <td class="p-2">${c.Title ?? ""}</td>
                <td class="p-2">${c.Firma ?? ""}</td>
                <td class="p-2">${c.EMail ?? c["E_x002d_Mail"] ?? ""}</td>
                <td class="p-2">${c.Telefon ?? ""}</td>
            </tr>
        `;
    });
}

// LOGOUT
function logout() {
    msalInstance.logoutPopup();
}

// INIT
window.addEventListener("load", async () => {
    await initMsal();

    document.getElementById("btnLogin").onclick = login;
    document.getElementById("btnLoad").onclick = loadContacts;
    document.getElementById("btnLogout").onclick = logout;

    log("App gestartet");
});
</script>

</body>
</html>
