<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM bbz Login-Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans text-slate-800">

    <div class="bg-white p-10 rounded-2xl shadow-xl max-w-md w-full text-center border border-slate-200">
        <h1 class="text-3xl font-black text-blue-900 mb-2">CRM bbz</h1>
        <p class="text-slate-500 mb-8 font-medium text-sm uppercase tracking-widest">Auth-Check V1</p>
        
        <div id="auth-area">
            <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg active:scale-95">
                Mit Microsoft 365 anmelden
            </button>
        </div>

        <div id="user-info" class="hidden">
            <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6">
                <p class="text-green-700 font-bold">Verbindung steht!</p>
            </div>
            <p id="userName" class="text-xl font-bold"></p>
            <p id="userEmail" class="text-slate-500 mb-8"></p>
            <button id="logoutBtn" class="text-slate-400 hover:text-red-500 text-sm font-medium transition">Abmelden</button>
        </div>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "c4143c1e-33ea-4c4d-a410-58110f966d0a",
                authority: "https://login.microsoftonline.com/3643e7ab-d166-4e27-bd5f-c5bbfcd282d7",
                redirectUri: "https://markusbaechler.github.io/crm-spa/"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authArea = document.getElementById('auth-area');
        const userInfo = document.getElementById('user-info');

        function updateUI(account) {
            if (account) {
                authArea.classList.add('hidden');
                userInfo.classList.remove('hidden');
                document.getElementById('userName').innerText = account.name;
                document.getElementById('userEmail').innerText = account.username;
            }
        }

        loginBtn.onclick = async () => {
            try {
                const response = await msalInstance.loginPopup({
                    scopes: ["User.Read", "Sites.Read.All"]
                });
                updateUI(response.account);
            } catch (err) {
                console.error(err);
                alert("Fehler: " + err.message);
            }
        };

        logoutBtn.onclick = () => { msalInstance.logout(); };

        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) { updateUI(accounts[0]); }
    </script>
</body>
</html>
