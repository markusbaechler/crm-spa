<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bbz CRM</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      color: #111827;
      font-family: "Segoe UI", Arial, sans-serif;
      font-style: normal !important;
    }
    * { box-sizing: border-box; font-style: normal !important; }
    .bbz-button {
      height: 38px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      padding: 0 12px;
      font-size: 14px;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 500;
    }
    .bbz-button-primary {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }
    .bbz-button-secondary {
      background: white;
      border-color: #d1d5db;
      color: #111827;
    }
    .bbz-nav-btn {
      border: none;
      background: transparent;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #4b5563;
      cursor: pointer;
    }
    .bbz-nav-btn.active {
      background: #e5eefc;
      color: #1d4ed8;
    }
    .bbz-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }
    .bbz-card-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .bbz-card-body {
      padding: 16px;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-[1800px] mx-auto px-4 py-3 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <div class="text-[22px] leading-7 text-slate-900 font-semibold">bbz CRM</div>
          <div class="text-sm text-slate-500">Firmenzentriertes operatives CRM auf SharePoint / Microsoft Graph</div>
        </div>

        <div class="flex items-center gap-2 flex-wrap">
          <button id="btn-login" class="bbz-button bbz-button-primary">Anmelden</button>
          <button id="btn-refresh" class="bbz-button bbz-button-secondary">Neu laden</button>
          <div id="auth-status" class="text-sm text-slate-500"></div>
        </div>
      </div>
    </header>

    <nav class="bg-white border-b border-slate-200">
      <div class="max-w-[1800px] mx-auto px-4 py-2 flex items-center gap-2 flex-wrap">
        <button class="bbz-nav-btn active" data-route="firms">Firmen</button>
        <button class="bbz-nav-btn" data-route="contacts">Kontakte</button>
        <button class="bbz-nav-btn" data-route="planning">Planung</button>
      </div>
    </nav>

    <main class="max-w-[1800px] mx-auto px-4 py-4">
      <div id="global-message" class="mb-4 border rounded-xl px-4 py-3 bg-amber-50 border-amber-200 text-amber-700">
        Lade lokale MSAL-Datei...
      </div>
      <div id="view-root"></div>
    </main>
  </div>

  <script>
    window.addEventListener("error", function (event) {
      const box = document.getElementById("global-message");
      if (box) {
        box.className = "mb-4 border rounded-xl px-4 py-3 bg-red-50 border-red-200 text-red-700";
        box.textContent = "Script-Fehler: " + (event.message || "Unbekannter Fehler");
      }
    });
  </script>

  <script src="./msal-browser.min.js"></script>

  <script>
    (function () {
      const box = document.getElementById("global-message");

      if (!window.msal || !window.msal.PublicClientApplication) {
        box.className = "mb-4 border rounded-xl px-4 py-3 bg-red-50 border-red-200 text-red-700";
        box.innerHTML = `
          <div><strong>Lokale MSAL-Datei wurde nicht geladen.</strong></div>
          <div class="mt-2">Prüfe:</div>
          <div>1. Datei <code>msal-browser.min.js</code> existiert wirklich</div>
          <div>2. Datei liegt im gleichen Ordner wie <code>index.html</code></div>
          <div>3. Dateiname ist exakt gleich</div>
          <div>4. Die Datei ist über Browser direkt erreichbar</div>
        `;
        return;
      }

      box.className = "mb-4 border rounded-xl px-4 py-3 bg-green-50 border-green-200 text-green-700";
      box.textContent = "MSAL lokal erfolgreich geladen. app.js wird jetzt gestartet.";

      const s = document.createElement("script");
      s.src = "./app.js";
      s.onload = function () {
        box.textContent = "MSAL lokal erfolgreich geladen. Anwendung gestartet.";
      };
      s.onerror = function () {
        box.className = "mb-4 border rounded-xl px-4 py-3 bg-red-50 border-red-200 text-red-700";
        box.textContent = "app.js konnte nicht geladen werden.";
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
